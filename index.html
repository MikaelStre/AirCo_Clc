<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AC Cooling Calculator – Baltic Yachts</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AC Calc">
<meta name="theme-color" content="#1a2744">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--navy2:#243350;--navy3:#2e4168;
  --gold:#c9a96e;--gold2:#e0c899;--gold-bg:#fdf6ec;
  --white:#fff;--bg:#f4f5f8;
  --g100:#f0f2f5;--g200:#e4e7ec;--g300:#d0d5dd;
  --g500:#667085;--g700:#344054;--text:#1d2939;
  --green:#12b76a;--green-bg:#d1fae5;--green-dark:#065f46;
  --red:#f04438;--red-bg:#fee2e2;--red-dark:#991b1b;
  --r:8px;--r2:4px;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.07);
  --sh2:0 4px 20px rgba(26,39,68,.14);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;min-height:100dvh}
header{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3);padding-top:var(--sat)}
.hdr{max-width:1440px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo-wrap{display:flex;align-items:center;gap:16px}
.hdr-title h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:.3px}
.hdr-btns{display:flex;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.25)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-link{background:none;border:none;color:var(--g500);font-size:12px;padding:4px 8px;cursor:pointer}.btn-link:hover{color:var(--navy)}
.settings-bar{background:var(--white);border-bottom:1px solid var(--g200);position:sticky;top:calc(68px + var(--sat));z-index:150}
.sb-inner{max-width:1440px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sb-group{display:flex;flex-direction:column;gap:4px}
.sb-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500)}
.toggle{display:flex;border:1.5px solid var(--g300);border-radius:var(--r2);overflow:hidden;height:32px}
.toggle button{padding:0 14px;border:none;background:var(--white);color:var(--g700);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.toggle button.on{background:var(--navy);color:#fff}
.toggle button:not(:last-child){border-right:1.5px solid var(--g300)}
.sup-pick{display:flex;gap:5px;height:32px;flex-wrap:wrap}
.sup-btn{padding:0 12px;border:1.5px solid var(--g300);border-radius:var(--r2);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--g700)}
.sup-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--navy)}
.cop-inp{width:64px;padding:5px 8px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;font-weight:500;text-align:center}
.cop-inp:focus{outline:none;border-color:var(--navy)}
.sb-sep{width:1px;height:32px;background:var(--g200)}
.proj-toggle-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--g300);border-radius:var(--r2);background:var(--white);font-size:12px;cursor:pointer;color:var(--g700);transition:all .15s}
.proj-toggle-btn:hover{border-color:var(--navy);color:var(--navy)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.proj-panel{background:var(--white);border-bottom:1px solid var(--g200);overflow:hidden;max-height:0;transition:max-height .35s ease}
.proj-panel.open{max-height:380px}
.proj-grid{max-width:1440px;margin:0 auto;padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.proj-actions{max-width:1440px;margin:0 auto;padding:12px 24px 16px;display:flex;gap:10px;border-top:1px solid var(--g200);flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g500)}
.field input,.field select{padding:7px 10px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;color:var(--text);transition:border-color .15s;width:100%;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy)}
main{max-width:1440px;margin:0 auto;padding:20px 24px;display:grid;gap:16px;padding-bottom:calc(20px + var(--sab))}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.card-hdr{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200)}
.card-hdr h2{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px}
.card-hdr-right{display:flex;align-items:center;gap:8px}
.badge{background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge-gold{background:var(--gold);color:var(--navy)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--g100);padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g200);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(26,39,68,.02)}
.ti{padding:5px 8px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;background:#fff;transition:border-color .15s;width:100%}
.ti:focus{outline:none;border-color:var(--navy)}
.ti-name{min-width:140px}.ti-type{min-width:160px}.ti-num{max-width:58px;text-align:right}
.tc{text-align:center}
.tc input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.p-ok{background:var(--green-bg);color:var(--green-dark)}
.p-warn{background:#fef3c7;color:#92400e}
.p-err{background:var(--red-bg);color:var(--red-dark)}
.p-dim{background:var(--g100);color:var(--g500)}
.tbl-footer{padding:10px 16px;background:var(--g100);border-top:1px solid var(--g200);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.icon-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--g500);border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.icon-btn:hover{background:var(--red-bg);color:var(--red)}
.humidity-section{padding:16px;background:var(--g100);border-radius:var(--r2);margin:12px 16px}
.humidity-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:10px}
.humidity-cell{padding:12px;background:var(--white);border-radius:var(--r2);border-left:3px solid var(--gold)}
.humidity-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g500);margin-bottom:4px}
.humidity-val{font-size:18px;font-weight:700;color:var(--navy)}
.humidity-unit{font-size:11px;color:var(--g500);margin-top:2px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:16px}
.kpi{padding:12px 16px;background:var(--bg);border-radius:var(--r2);border-left:3px solid var(--gold)}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);margin-bottom:4px}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-u{font-size:11px;color:var(--g500);margin-top:2px}
.result-table th{background:var(--navy);color:#fff}
.result-table tbody tr:nth-child(even) td{background:rgba(26,39,68,.025)}
.result-table tfoot td{background:var(--navy);color:#fff;font-weight:600;padding:9px 10px}
.energy-section{padding:16px}
.energy-total{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:4px}
.energy-sub{font-size:12px;color:var(--g500);margin-bottom:16px}
.energy-bars{display:grid;gap:10px}
.e-bar-row{display:grid;grid-template-columns:120px 1fr 70px;align-items:center;gap:12px}
.e-bar-label{font-size:12px;color:var(--g700);font-weight:500}
.e-bar-track{height:20px;background:var(--g200);border-radius:3px;overflow:hidden;position:relative}
.e-bar-fill{height:100%;border-radius:3px;position:relative;transition:width .4s ease}
.e-bar-fill::after{content:attr(data-label);position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.e-bar-day{background:var(--navy)}.e-bar-sil{background:var(--gold)}.e-bar-red{background:var(--g300)}
.e-bar-val{font-size:13px;font-weight:600;color:var(--navy);text-align:right}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;user-select:none;border-top:1px solid var(--g200)}
.acc-hdr:hover{background:var(--g100)}
.acc-hdr h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500)}
.acc-hdr .chevron{font-size:12px;color:var(--g500);transition:transform .2s}
.acc-body{overflow:hidden;max-height:0;transition:max-height .3s ease}
.acc-body.open{max-height:4000px}
.acc-body .inner{padding:0 0 16px}
.acc-hdr.open .chevron{transform:rotate(180deg)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;backdrop-filter:blur(2px)}
.overlay.show{display:block}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:var(--r);box-shadow:var(--sh2);z-index:600;width:min(720px,95vw);max-height:85vh;flex-direction:column}
.modal.show{display:flex}
.modal-hdr{padding:16px 20px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h2{font-size:14px;font-weight:700;color:#fff;letter-spacing:.5px}
.modal-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:rgba(255,255,255,.1);color:#fff}
.modal-tabs{display:flex;gap:5px;padding:12px 20px 0;flex-shrink:0;flex-wrap:wrap}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;flex-shrink:0}
.sup-table{width:100%;border-collapse:collapse;font-size:13px}
.sup-table th{padding:8px 10px;background:var(--g100);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g200);text-align:left}
.sup-table td{padding:7px 10px;border-bottom:1px solid var(--g100)}
.sup-table tr:hover td{background:var(--g100)}
.sup-inp{padding:4px 7px;border:1.5px solid var(--g300);border-radius:3px;font-size:12px;width:100%}
.sup-inp:focus{outline:none;border-color:var(--navy)}
.add-unit-row{display:flex;gap:8px;padding:10px 0 0;align-items:flex-end;flex-wrap:wrap}
.add-unit-row .field{flex:1;min-width:120px}
.empty{text-align:center;padding:40px 20px;color:var(--g500)}
.empty .icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px}
.section-sep{padding:12px 20px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);border-top:1px solid var(--g200);background:var(--white)}
@media print{
  .settings-bar,.hdr-btns,.tbl-footer,.icon-btn,.no-print,.overlay,.modal{display:none!important}
  header{position:static!important;padding-top:0!important}
  .proj-panel{max-height:none!important}
  main{padding:16px!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important;page-break-inside:avoid;margin-bottom:16px}
  .card-hdr{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .acc-body{max-height:none!important}
  th,.result-table th{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .result-table tfoot td{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:1.5cm;size:A4 landscape}
}
@media(max-width:900px){
  .hdr{padding:0 14px;height:58px}
  .settings-bar{top:calc(58px + var(--sat))}
  .sb-inner{padding:8px 12px;gap:10px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .sb-group{flex-shrink:0}
  .sb-sep{display:none}
  .proj-grid{grid-template-columns:1fr 1fr;padding:12px;gap:10px}
  main{padding:12px;gap:12px}
  .kpi-row{grid-template-columns:1fr 1fr;padding:12px;gap:8px}
  .kpi-v{font-size:18px}
  .modal{width:96vw;max-height:88vh}
  .e-bar-row{grid-template-columns:90px 1fr 58px;gap:8px}
}
@media(max-width:600px){
  .hdr{height:52px}
  .hdr-title h1{font-size:13px}
  .hdr-btns .btn-ghost{display:none}
  .settings-bar{top:calc(52px + var(--sat))}
  main{padding:10px;gap:10px}
  .kpi-row{grid-template-columns:1fr 1fr;padding:10px;gap:7px}
  .kpi{padding:10px 12px}
  .kpi-v{font-size:16px}
  th,td{padding:6px 7px;font-size:12px}
  .modal{width:98vw;max-height:92vh;top:4%;transform:translateX(-50%)}
  .ti,.ti-name,.ti-type{font-size:16px}
  select.ti{font-size:16px}
  input[type=checkbox]{width:18px;height:18px}
  .e-bar-row{grid-template-columns:80px 1fr 50px;gap:6px}
  .e-bar-label{font-size:11px}
  .humidity-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
<div class="hdr">
  <div class="logo-wrap">
    <svg viewBox="0 0 130 44" xmlns="http://www.w3.org/2000/svg" style="width:130px;height:44px;flex-shrink:0">
      <text x="0" y="28" font-family="Georgia,'Times New Roman',serif" font-size="24" font-weight="700" fill="#c9a96e" letter-spacing="3.5">BALTIC</text>
      <line x1="0" y1="33" x2="126" y2="33" stroke="#c9a96e" stroke-width="0.5" opacity="0.6"/>
      <text x="2" y="43" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="rgba(255,255,255,0.8)" letter-spacing="9">YACHTS</text>
    </svg>
    <div class="hdr-title"><h1>AC Cooling Calculator</h1></div>
  </div>
  <div class="hdr-btns no-print">
    <button class="btn btn-ghost btn-sm" onclick="exportExcel()">&#11015; Excel</button>
    <button class="btn btn-ghost btn-sm" onclick="exportPDF()">&#128196; PDF</button>
    <button class="btn btn-gold btn-sm" onclick="window.print()">&#128438; Print</button>
  </div>
</div>
</header>

<div class="settings-bar no-print">
<div class="sb-inner">
  <button class="proj-toggle-btn" id="proj-btn" onclick="toggleProj()">&#128203; Project <span id="proj-chevron">&#9662;</span></button>
  <div class="sb-sep"></div>
  <div class="sb-group">
    <label>Climate</label>
    <div class="toggle">
      <button id="btn-med" class="on" onclick="setClimate('med')">Mediterranean</button>
      <button id="btn-trop" onclick="setClimate('trop')">Tropical</button>
    </div>
  </div>
  <div class="sb-group">
    <label>FAMU</label>
    <div class="toggle">
      <button id="btn-famu-n" class="on" onclick="setFAMU(false)">No</button>
      <button id="btn-famu-y" onclick="setFAMU(true)">Yes</button>
    </div>
  </div>
  <div class="sb-group">
    <label>Supplier <button class="btn-link btn-xs" onclick="openSupplierModal()">&#9881; Edit</button></label>
    <div class="sup-pick" id="sup-pick"></div>
  </div>
  <div class="sb-group">
    <label>COP</label>
    <input type="number" class="cop-inp" id="cop" value="3.0" min="1.5" max="6" step="0.1" oninput="recalc()">
  </div>
</div>
</div>

<div class="proj-panel" id="proj-panel">
  <div class="proj-grid" id="proj-grid"></div>
  <div class="proj-actions">
    <button class="btn btn-primary btn-sm" onclick="saveProject()">&#128190; Save</button>
    <button class="btn btn-ghost btn-sm" onclick="openProjectModal()">&#128194; Load</button>
    <button class="btn btn-ghost btn-sm" onclick="newProject()">&#128196; New</button>
  </div>
</div>

<main id="main-content"></main>

<div class="overlay" id="proj-overlay" onclick="closeProjectModal()"></div>
<div class="modal" id="proj-modal">
  <div class="modal-hdr"><h2>&#128194; Saved Projects</h2><button class="modal-close" onclick="closeProjectModal()">&#10005;</button></div>
  <div class="modal-body"><div id="projects-list" style="display:grid;gap:10px"></div></div>
  <div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeProjectModal()">Close</button></div>
</div>

<div class="overlay" id="sup-overlay" onclick="closeSupplierModal()"></div>
<div class="modal" id="sup-modal">
  <div class="modal-hdr"><h2>&#9881; Supplier Catalog</h2><button class="modal-close" onclick="closeSupplierModal()">&#10005;</button></div>
  <div class="modal-tabs" id="sup-modal-tabs"></div>
  <div class="modal-body">
    <p style="font-size:12px;color:var(--g500);margin-bottom:12px">Edit model names, BTU and weights. Supplier: <strong id="modal-sup-name">—</strong></p>
    <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" style="background:var(--g100)" onclick="document.getElementById('csv-upload').click()">&#8679; Import CSV/JSON</button>
      <button class="btn btn-sm" style="background:var(--g100)" onclick="exportSupplierCSV()">&#11015; Export CSV</button>
      <input type="file" id="csv-upload" style="display:none" accept=".csv,.json" onchange="importSupplierData(event)">
    </div>
    <table class="sup-table">
      <thead><tr><th>Model</th><th>BTU/h</th><th>Weight kg</th><th class="no-print" style="width:50px"></th></tr></thead>
      <tbody id="sup-edit-body"></tbody>
    </table>
    <div class="add-unit-row">
      <div class="field"><label>Model</label><input class="sup-inp" id="new-model" placeholder="e.g. EVA30"></div>
      <div class="field"><label>BTU/h</label><input class="sup-inp" type="number" id="new-btu" placeholder="30000"></div>
      <div class="field"><label>Weight kg</label><input class="sup-inp" type="number" id="new-kg" placeholder="20"></div>
      <button class="btn btn-primary btn-sm" onclick="addSupplierUnit()" style="flex-shrink:0;height:32px;margin-bottom:0">+ Add</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost btn-sm" onclick="closeSupplierModal()">Cancel</button>
    <button class="btn btn-primary btn-sm" onclick="closeSupplierModal()">Done</button>
  </div>
</div>

<footer style="background:var(--navy);color:rgba(255,255,255,.45);text-align:center;padding:14px;padding-bottom:calc(14px + var(--sab));font-size:11px;margin-top:24px">
  <strong style="color:var(--gold)">Baltic Yachts Ltd</strong> &mdash; Engineering Department &middot; AC Cooling Calculator v3.2 &middot; ISO 7547
</footer>

<script>
// ==========================================================
// AC COOLING CALCULATOR v3.2
// Fix: appendRow guards against duplicates with ID check
// ==========================================================

// ── CONSTANTS ──────────────────────────────────────────────

var TYPES = {
  owners:    {l:"Owner's Cabin",        med:80,  trop:250, ach:1.5},
  captains:  {l:"Captain's Cabin",      med:100, trop:270, ach:2.0},

function loadProject(i){
  var projects = JSON.parse(localStorage.getItem("ac_projects")||"[]");
  var p = projects[i];
  if(!p) return;
  // Support both old and new save formats
  if(p.project){
    S.project = p.project;
    S.cabins  = p.cabins || [];
    S.sup     = p.sup || "VECO";
    S.climate = p.climate || "med";
    S.famu    = p.famu || false;
    el("cop").value = p.cop || "3.0";
  } else {
    S.project = {yacht:p.yacht||"",proj:p.proj||"",by:p.by||"",date:p.date||"",rev:p.rev||"",client:p.client||"",cls:p.cls||p.class||"Lloyd's Register (LRS)"};
    S.cabins  = p.cabins || [];
    S.sup     = p.sup || "VECO";
    S.climate = p.climate || "med";
    S.famu    = p.famu || false;
    el("cop").value = p.cop || "3.0";
  }
  S.nid = S.cabins.reduce(function(mx,c){ return Math.max(mx, c.id||0); }, 0) + 1;
  closeProjectModal();
  setClimate(S.climate);
  setFAMU(S.famu);
  renderProjectFields();
  renderSupplierButtons();
  renderMainContent();
  renderCabins();   // ← restores cabin rows from loaded data

}

function deleteProject(i){
  var projects = JSON.parse(localStorage.getItem("ac_projects")||"[]");

// ── CALCULATION ────────────────────────────────────────────

function calcCabin(c){
  var area=Number(c.area)||0, h=Number(c.h)||2.1, p=Number(c.p)||0, ach=Number(c.ach)||2, wc=!!c.wc;
  var t   = TYPES[c.type] || TYPES.other;
  var cli = CLIMATE[S.climate];
  var wm2 = S.climate==="med" ? t.med : t.trop;
  var vol = area * h;
  var fv  = Math.max((vol*ach)/3.6, p*7, area>0?3:0);
  var wcExt = wc ? Math.max(area*4.5, 15) : 0;
  var dH_d = S.famu ? cli.famu.cabin_dH : cli.day.dH;
  var vH_d = 1.29 * 1.01 * fv * dH_d;
  var base_d = wm2 * area, pers = p*150, inst = 10*area;
  var totW_d = base_d + vH_d + pers + inst;
  var totB_d = totW_d * 3.41214;
  var classMin = Math.max(p*7, vol*0.5/3.6);
  return {area:area, h:h, p:p, ach:ach, wc:wc, wm2:wm2, vol:vol, fv:fv, wcExt:wcExt,
          base_d:base_d, vH_d:vH_d, pers:pers, inst:inst, totW_d:totW_d, totB_d:totB_d, classMin:classMin};
}

function calcEnergy(unitBTU){
  var cop = Number(el("cop").value) || 3;
  var eKW = (unitBTU/3412) / cop;
  return {eKW:eKW, day:eKW*12, sil:eKW*0.55*8, red:eKW*0.05*4,
          get tot(){ return this.day+this.sil+this.red; }};
}

function recUnit(btu){
  var units = SUPS[S.sup].u.slice().sort(function(a,b){ return a.b-b.b; });
  var found = units.filter(function(u){ return u.b>=btu; });
  return found.length ? found[0] : units[units.length-1] || {m:"—",b:0,w:0};
}

function typeOptions(selected){

// THE KEY FIX: guard at top prevents any row ever being added twice
function appendRow(c){
  // If this cabin already has a row in the table, do nothing
  if(el("r" + c.id)) return;

  var er = el("empty-row");
  if(er) er.remove();

  var tr = document.createElement("tr");
  tr.id = "r" + c.id;
  tr.innerHTML =
    "<td class='rn' style='color:var(--g500);font-weight:600'>-</td>" +
    "<td><input class='ti ti-name' type='text' value='" + esc(c.name||"") + "' placeholder=\"e.g. Owner's Cabin\" oninput=\"upd(" + c.id + ",'name',this.value)\"></td>" +
    "<td><select class='ti ti-type' onchange='updType(" + c.id + ",this.value)'>" + typeOptions(c.type) + "</select></td>" +
    "<td><input class='ti ti-num' type='number' value='" + (c.area||"") + "' min='1' max='500' step='0.5' oninput=\"upd(" + c.id + ",'area',+this.value)\"></td>" +
    "<td><input class='ti ti-num' type='number' value='" + (c.h||2.1) + "' min='1.5' max='4' step='0.1' oninput=\"upd(" + c.id + ",'h',+this.value)\"></td>" +

    "<td><input class='ti ti-num' type='number' value='" + (c.ach||2) + "' id='ach" + c.id + "' min='0' max='20' step='0.5' oninput=\"upd(" + c.id + ",'ach',+this.value)\"></td>" +
    "<td id='cn" + c.id + "' style='font-weight:600;white-space:nowrap;color:var(--navy)'>-</td>" +
    "<td class='tc' id='st" + c.id + "'><span class='pill p-dim'>-</span></td>" +
    "<td class='no-print'><button class='icon-btn' onclick='removeRow(" + c.id + ")'>&#10005;</button></td>";
  el("cabin-body").appendChild(tr);
}

// Full re-render — clears first, then draws all cabins (used by loadProject)
function renderCabins(){
  var tbody = el("cabin-body");
  tbody.innerHTML = "";
  if(!S.cabins.length){
    tbody.innerHTML = "<tr id='empty-row'><td colspan='11'><div class='empty'><div class='icon'>\uD83D\uDEA2</div><p>Click <strong>+ Add Space</strong> to begin</p></div></td></tr>";
  } else {
    S.cabins.forEach(function(c){ appendRow(c); });
    updateRowNums();
  }
  updateBadge();
}

// Add one cabin — pushes to array, appends ONE row
function addCabin(data){
  var id = S.nid++;
  var c = data ? Object.assign({}, data, {id:id}) : {id:id, name:"", type:"guest", area:"", h:2.1, p:2, wc:true, ach:2.0};
  S.cabins.push(c);
  appendRow(c);
  updateRowNums();
  updateBadge();
  recalc();
}

function addPreset(key){ addCabin(Object.assign({}, PRESETS[key])); }

function removeRow(id){
  S.cabins = S.cabins.filter(function(c){ return c.id!==id; });
  var row = el("r"+id);
  if(row) row.remove();
  if(!S.cabins.length){
    el("cabin-body").innerHTML = "<tr id='empty-row'><td colspan='11'><div class='empty'><div class='icon'>\uD83D\uDEA2</div><p>Click <strong>+ Add Space</strong> to begin</p></div></td></tr>";
    el("results-card").style.display = "none";
  }
  updateRowNums();
  updateBadge();
  recalc();
}

function updateRowNums(){
  S.cabins.forEach(function(c,i){
    var cell = document.querySelector("#r"+c.id+" .rn");
    if(cell) cell.textContent = i+1;
  });
}

function updateBadge(){
  var n = S.cabins.length;
  var b = el("cabin-badge");
  if(b) b.textContent = n + (n===1?" space":" spaces");
}

function upd(id, field, val){
  var c = S.cabins.find(function(c){ return c.id===id; });
  if(c){ c[field]=val; recalc(); }
}

function updType(id, type){
  var c = S.cabins.find(function(c){ return c.id===id; });
  if(!c) return;
  c.type = type;
  var achEl = el("ach"+id);
  if(achEl && TYPES[type]){ achEl.value = TYPES[type].ach; c.ach = TYPES[type].ach; }
  recalc();
}

// ── RECALCULATE ────────────────────────────────────────────

function recalc(){
  if(!S.cabins.length){
    el("results-card").style.display = "none";
    return;
  }

  var rows = S.cabins.map(function(c,i){
    var cr   = calcCabin(c);
    var unit = recUnit(cr.totB_d);
    var e    = calcEnergy(unit.b);
    var ok   = unit.b >= cr.totB_d;
    var margin = unit.b ? (unit.b - cr.totB_d) / cr.totB_d * 100 : 0;

    var cnEl = el("cn"+c.id);
    if(cnEl) cnEl.textContent = f1(cr.totW_d/1000) + " kW";

    var stEl = el("st"+c.id);
    if(stEl){
      if(unit.b){
        stEl.innerHTML = ok
          ? "<span class='pill p-ok'>\u2713 +" + Math.round(margin) + "%</span>"
          : "<span class='pill p-err'>\u2717 " + Math.round(margin) + "%</span>";
      } else {
        stEl.innerHTML = "<span class='pill p-dim'>-</span>";
      }
    }
    return {c:c, cr:cr, unit:unit, e:e, ok:ok, margin:margin};
  });

  var totW    = rows.reduce(function(s,r){ return s+r.cr.totW_d; }, 0);
  var totB    = rows.reduce(function(s,r){ return s+r.cr.totB_d; }, 0);
  var totInst = rows.reduce(function(s,r){ return s+r.unit.b; }, 0);
  var totKg   = rows.reduce(function(s,r){ return s+r.unit.w; }, 0);
  var totEd   = rows.reduce(function(s,r){ return s+r.e.day; }, 0);
  var totEs   = rows.reduce(function(s,r){ return s+r.e.sil; }, 0);
  var totEr   = rows.reduce(function(s,r){ return s+r.e.red; }, 0);
  var totEt   = totEd + totEs + totEr;
  var cop     = Number(el("cop").value) || 3;
  var totEkW  = (totInst/3412) / cop;

  el("results-card").style.display = "";
  el("res-badge").textContent = f0(Math.round(totB)) + " BTU \u00b7 " + f1(totW/1000) + " kW";

  renderKPIs(totW, totB, totInst, totKg, totEt, totEkW, rows.length);
  renderEquip(rows, totB, totInst, totKg);
  renderHumidity();
  renderEnergy(totEd, totEs, totEr, totEt);
  renderTech(rows, totW, totB);
  renderVent(rows);
  renderConditions();
}

// ── RESULT RENDERERS ───────────────────────────────────────

function renderKPIs(totW, totB, totInst, totKg, totEt, totEkW, n){
  el("kpi-row").innerHTML =
    kpi("Cooling Need",   f1(totW/1000),              "kW") +
    kpi("BTU/h Needed",   f0(Math.round(totB/1000))+"k", "BTU/h") +
    kpi("Installed",      f0(Math.round(totInst/1000))+"k","BTU/h") +
    kpi("Electrical",     f1(totEkW),                 "kW full load") +
    kpi("Weight",         f1(totKg),                  "kg total") +
    kpi("Daily Energy",   f1(totEt),                  "kWh/day") +
    kpi("AC Zones",       String(n),                  "spaces") +
    kpi("Supplier",       SUPS[S.sup].n,              "selected");
}
function kpi(label, val, unit){
  return "<div class='kpi'><div class='kpi-l'>" + label + "</div><div class='kpi-v'>" + val + "</div><div class='kpi-u'>" + unit + "</div></div>";
}

function renderEquip(rows, totB, totInst, totKg){
  el("equip-body").innerHTML = rows.map(function(r,i){
    var c=r.c, cr=r.cr, unit=r.unit, ok=r.ok, margin=r.margin;
    var pill = unit.b
      ? (ok ? "<span class='pill p-ok'>\u2713 +" + Math.round(margin) + "%</span>"
            : "<span class='pill p-err'>\u2717 undersize</span>")
      : "<span class='pill p-dim'>-</span>";
    return "<tr>" +
      "<td>" + (i+1) + "</td>" +
      "<td><strong>" + esc(c.name || (TYPES[c.type] ? TYPES[c.type].l : c.type)) + "</strong></td>" +
      "<td>" + (TYPES[c.type] ? TYPES[c.type].l : c.type) + "</td>" +
      "<td>" + f1(cr.area) + " m\u00b2</td>" +
      "<td>" + f1(cr.totW_d/1000) + " kW<br><span style='font-size:11px;color:var(--g500)'>" + f0(Math.round(cr.totB_d)) + " BTU</span></td>" +
      "<td><strong>" + unit.m + "</strong></td>" +
      "<td>" + (unit.b ? f0(unit.b)+" BTU" : "-") + "</td>" +
      "<td>" + (unit.w ? unit.w+" kg" : "-") + "</td>" +
      "</tr>";
  }).join("");
  el("equip-foot").innerHTML =
    "<tr><td colspan='4'><strong>TOTAL</strong></td>" +
    "<td><strong>" + f1(totB/1000) + " kW / " + f0(Math.round(totB)) + " BTU</strong></td>" +
    "<td></td><td><strong>" + f0(totInst) + " BTU</strong></td>" +
    "<td><strong>" + f1(totKg) + " kg</strong></td></tr>";
}

function renderHumidity(){
  var cli = CLIMATE[S.climate];
  var dH  = S.famu ? cli.famu.cabin_dH : cli.day.dH;
  var h   = cli.humidity;
  el("humidity-section").innerHTML =
    "<div class='humidity-section'>" +
    "<strong>Humidity Targets (ISO 7547) \u2014 " + cli.label + "</strong>" +
    "<div class='humidity-row'>" +
      hcell("Daytime",     h.day.min+"\u2013"+h.day.max+"% RH", "\u0394H = "+f1(dH)+" kJ/kg") +
      hcell("Silent/Night",h.sil.min+"\u2013"+h.sil.max+"% RH", "\u0394H = "+f1(cli.sil.dH)+" kJ/kg") +
      hcell("Standby",     h.red.min+"\u2013"+h.red.max+"% RH", "Minimal load") +
    "</div></div>";
}
function hcell(label, val, unit){
  return "<div class='humidity-cell'><div class='humidity-label'>" + label + "</div><div class='humidity-val'>" + val + "</div><div class='humidity-unit'>" + unit + "</div></div>";
}

function renderEnergy(totEd, totEs, totEr, totEt){
  var maxBar = Math.max(totEd, 1);
  el("energy-total").textContent = f1(totEt) + " kWh / day";
  el("cop-display").textContent  = el("cop").value || 3;
  el("energy-bars").innerHTML =
    ebar("Daytime (12h)", "e-bar-day", 100,                          f1(totEd)+" kWh \u00b7 100%", f1(totEd)) +
    ebar("Silent (8h)",   "e-bar-sil", Math.round(totEs/maxBar*100), f1(totEs)+" kWh \u00b7 55%",  f1(totEs)) +
    ebar("Reduced (4h)",  "e-bar-red", Math.round(totEr/maxBar*100), f1(totEr)+" kWh \u00b7 5%",   f1(totEr)) +
    "<div class='e-bar-row' style='margin-top:8px;border-top:1px solid var(--g200);padding-top:8px'>" +
      "<div class='e-bar-label' style='font-weight:700'>Daily Total</div><div></div>" +
      "<div class='e-bar-val' style='font-weight:700;color:var(--navy)'>" + f1(totEt) + " kWh</div></div>";
}
function ebar(label, cls, pct, dataLabel, val){
  return "<div class='e-bar-row'><div class='e-bar-label'>" + label + "</div>" +
    "<div class='e-bar-track'><div class='" + cls + " e-bar-fill' style='width:" + pct + "%' data-label='" + dataLabel + "'></div></div>" +
    "<div class='e-bar-val'>" + val + " kWh</div></div>";
}

function renderTech(rows, totW, totB){
  el("tech-body").innerHTML = rows.map(function(r,i){
    var c=r.c, cr=r.cr;
    return "<tr><td>"+(i+1)+"</td><td>"+esc(c.name||(TYPES[c.type]?TYPES[c.type].l:"Space"))+"</td>" +
      "<td>"+cr.wm2+" W/m\u00b2</td><td>"+f0(Math.round(cr.base_d))+"</td><td>"+f0(Math.round(cr.vH_d))+"</td>" +
      "<td>"+f0(cr.pers)+"</td><td>"+f0(cr.inst)+"</td>" +
      "<td><strong>"+f0(Math.round(cr.totW_d))+"</strong></td><td>"+f0(Math.round(cr.totB_d))+"</td></tr>";
  }).join("");
  el("tech-foot").innerHTML = "<tr><td colspan='7'>TOTAL</td><td>"+f0(Math.round(totW))+" W</td><td>"+f0(Math.round(totB))+" BTU</td></tr>";
}

function renderVent(rows){
  el("vent-body").innerHTML = rows.map(function(r,i){
    var c=r.c, cr=r.cr, ok=cr.fv>=cr.classMin;
    return "<tr><td>"+(i+1)+"</td><td>"+esc(c.name||(TYPES[c.type]?TYPES[c.type].l:"Space"))+"</td>" +
      "<td>"+f1(cr.vol)+"</td><td>"+(c.ach||2)+"</td>" +
      "<td><strong>"+f1(cr.fv)+"</strong></td><td>"+f1(cr.classMin)+"</td>" +
      "<td>"+(cr.wcExt?f1(cr.wcExt):"-")+"</td>" +
      "<td>"+(ok?"<span class='pill p-ok'>\u2713 OK</span>":"<span class='pill p-err'>\u2717 FAIL</span>")+"</td></tr>";
  }).join("");
}

function renderConditions(){
  var cli = CLIMATE[S.climate];
  var cop = el("cop").value || 3;
  el("cond-body").innerHTML =
    "<tr><td>Climate zone</td><td>" + cli.label + "</td><td>ISO 7547</td></tr>" +
    "<tr><td>Daytime design</td><td>" + cli.day.desc + ", \u0394H=" + cli.day.dH + " kJ/kg</td><td>ISO 7547</td></tr>" +
    "<tr><td>Silent design</td><td>" + cli.sil.desc + ", \u0394H=" + cli.sil.dH + " kJ/kg</td><td>ISO 7547</td></tr>" +
    "<tr><td>FAMU</td><td>" + (S.famu ? "Yes \u2014 cabin \u0394H="+cli.famu.cabin_dH+", central \u0394H="+cli.famu.central_dH+" kJ/kg" : "No \u2014 fan-coil handles full outdoor load") + "</td><td>Design</td></tr>" +
    "<tr><td>Person heat</td><td>150 W/person</td><td>ISO 7547</td></tr>" +
    "<tr><td>Installation heat</td><td>10 W/m\u00b2</td><td>ISO 7547</td></tr>" +
    "<tr><td>Min fresh air</td><td>7 l/s/person</td><td>Class rules</td></tr>" +
    "<tr><td>WC extraction</td><td>4.5 l/s/m\u00b2 (min 15 l/s)</td><td>ISO 7547</td></tr>" +
    "<tr><td>Mode hours</td><td>Daytime 12h \u00b7 Silent 8h \u00b7 Reduced 4h</td><td>Design</td></tr>" +
    "<tr><td>Load factors</td><td>100% / 55% / 5%</td><td>ISO 7547</td></tr>" +
    "<tr><td>COP</td><td>" + cop + "</td><td>Input</td></tr>";
}

function toggleAcc(hdr){
  hdr.classList.toggle("open");
  if(hdr.nextElementSibling) hdr.nextElementSibling.classList.toggle("open");
}

// ── CONTROLS ───────────────────────────────────────────────

function setClimate(c){
  S.climate = c;
  el("btn-med").classList.toggle("on", c==="med");
  el("btn-trop").classList.toggle("on", c==="trop");
  recalc();
}
function setFAMU(v){
  S.famu = v;
  el("btn-famu-n").classList.toggle("on", !v);
  el("btn-famu-y").classList.toggle("on",  v);
  recalc();
}
function setSup(sup){ S.sup=sup; renderSupplierButtons(); recalc(); }
function renderSupplierButtons(){
  el("sup-pick").innerHTML = Object.keys(SUPS).map(function(k){
    return "<button class='sup-btn" + (S.sup===k?" on":"") + "' onclick=\"setSup('" + k + "')\">" + SUPS[k].n + "</button>";
  }).join("");
}

// ── SUPPLIER MODAL ─────────────────────────────────────────

var modalSup = "VECO";

function openSupplierModal(){
  modalSup = S.sup;
  renderSupModalTabs();
  renderSupplierEditor();
  el("sup-overlay").classList.add("show");
  el("sup-modal").classList.add("show");
}
function closeSupplierModal(){
  el("sup-overlay").classList.remove("show");
  el("sup-modal").classList.remove("show");
  saveSuppliersToStorage();
  renderSupplierButtons();
  recalc();
}
function renderSupModalTabs(){
  el("sup-modal-tabs").innerHTML = Object.keys(SUPS).map(function(k){
    return "<button class='sup-btn" + (k===modalSup?" on":"") + "' onclick=\"switchSupTab('" + k + "')\">" + SUPS[k].n + "</button>";
  }).join("");
  el("modal-sup-name").textContent = SUPS[modalSup].n;
}
function switchSupTab(k){ modalSup=k; renderSupModalTabs(); renderSupplierEditor(); }
function renderSupplierEditor(){
  var units = SUPS[modalSup].u.slice().sort(function(a,b){ return a.b-b.b; });
  el("sup-edit-body").innerHTML = units.map(function(u,i){
    return "<tr>" +
      "<td><input type='text' value='" + esc(u.m) + "' class='sup-inp' onchange=\"SUPS['" + modalSup + "'].u[" + i + "].m=this.value\"></td>" +
      "<td><input type='number' value='" + u.b + "' class='sup-inp' onchange=\"SUPS['" + modalSup + "'].u[" + i + "].b=+this.value\"></td>" +
      "<td><input type='number' value='" + u.w + "' class='sup-inp' onchange=\"SUPS['" + modalSup + "'].u[" + i + "].w=+this.value\"></td>" +
      "<td class='no-print'><button class='icon-btn' onclick=\"SUPS['" + modalSup + "'].u.splice(" + i + ",1);renderSupplierEditor()\">&#10005;</button></td>" +
      "</tr>";
  }).join("");
}
function addSupplierUnit(){
  var m=el("new-model").value.trim(), b=Number(el("new-btu").value), w=Number(el("new-kg").value);
  if(!m||!b){ alert("Enter model name and BTU/h"); return; }
  SUPS[modalSup].u.push({m:m,b:b,w:w});
  SUPS[modalSup].u.sort(function(a,b){ return a.b-b.b; });
  ["new-model","new-btu","new-kg"].forEach(function(id){ el(id).value=""; });
  renderSupplierEditor();
}
function exportSupplierCSV(){
  var rows = ["model,btu,weight"].concat(SUPS[modalSup].u.map(function(u){ return u.m+","+u.b+","+u.w; }));
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));
  a.download = SUPS[modalSup].n + "_catalog.csv";
  a.click();
}
function importSupplierData(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(evt){
    try{
      var data;
      if(file.name.endsWith(".json")){
        data = JSON.parse(evt.target.result);
      } else {
        var lines = evt.target.result.trim().split("\n");
        var hdr = lines[0].toLowerCase().split(",").map(function(h){ return h.trim(); });
        data = lines.slice(1).map(function(ln){
          var v=ln.split(",").map(function(x){ return x.trim(); });
          var o={};
          hdr.forEach(function(h,i){ o[h]=v[i]; });
          return o;
        });
      }
      if(Array.isArray(data)){
        SUPS[modalSup].u = data.map(function(r){ return {m:r.model||r.name||r.m||"", b:Number(r.btu||r.capacity||r.b)||0, w:Number(r.weight||r.w)||0}; });
        SUPS[modalSup].u.sort(function(a,b){ return a.b-b.b; });
        renderSupplierEditor();
        alert("Imported " + SUPS[modalSup].u.length + " units successfully!");
      }
    }catch(err){ alert("Import error: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
}
function saveSuppliersToStorage(){ localStorage.setItem("ac_suppliers", JSON.stringify(SUPS)); }
function loadSuppliersFromStorage(){
  var s = localStorage.getItem("ac_suppliers");
  if(s){ try{ SUPS=JSON.parse(s); }catch(e){} }
}

// ── EXPORT ─────────────────────────────────────────────────

function exportExcel(){
  if(!window.XLSX){ alert("Excel library loading, please wait."); return; }
  var wb = XLSX.utils.book_new();
  var m = S.project, cli = CLIMATE[S.climate], cop = Number(el("cop").value)||3;

  var info = [
    ["Baltic Yachts — AC Cooling Calculator v3.2 (ISO 7547)"],
    ["Yacht",m.yacht,"","Date",m.date],
    ["Project",m.proj,"","By",m.by],
    ["Revision",m.rev,"","Client",m.client],
    ["Climate",cli.label,"","FAMU",S.famu?"Yes":"No"],
    ["Supplier",SUPS[S.sup].n,"","COP",cop],[],
    ["#","Space","Type","Area m2","Persons","W/m2","Cooling W","BTU/h","Unit","Unit BTU","Weight kg","OK?"]
  ];
  var dataRows = S.cabins.map(function(c,i){
    var cr=calcCabin(c), u=recUnit(cr.totB_d);
    return [i+1, c.name||(TYPES[c.type]?TYPES[c.type].l:c.type), TYPES[c.type]?TYPES[c.type].l:c.type,
      cr.area, cr.p, cr.wm2, Math.round(cr.totW_d), Math.round(cr.totB_d), u.m, u.b||0, u.w||0, u.b>=cr.totB_d?"OK":"FAIL"];
  });
  var totW=S.cabins.reduce(function(s,c){return s+calcCabin(c).totW_d;},0);
  var totB=S.cabins.reduce(function(s,c){return s+calcCabin(c).totB_d;},0);
  dataRows.push([],["","","TOTAL","","","",Math.round(totW),Math.round(totB)]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(info.concat(dataRows)), "Cooling Loads");

  var eh=[["#","Space","Unit BTU","Installed kW","Elec kW","Day kWh","Silent kWh","Reduced kWh","Daily kWh"]];
  S.cabins.forEach(function(c,i){
    var cr=calcCabin(c), u=recUnit(cr.totB_d), e=calcEnergy(u.b);
    eh.push([i+1, c.name||(TYPES[c.type]?TYPES[c.type].l:c.type), u.b,
      Number((u.b/3412).toFixed(2)), Number(e.eKW.toFixed(2)),
      Number(e.day.toFixed(2)), Number(e.sil.toFixed(2)), Number(e.red.toFixed(2)), Number(e.tot.toFixed(2))]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(eh), "Energy");

  var vh=[["#","Space","Vol m3","ACH","Flow l/s","Class Min l/s","WC Ext l/s","OK?"]];
  S.cabins.forEach(function(c,i){
    var cr=calcCabin(c);
    vh.push([i+1, c.name||(TYPES[c.type]?TYPES[c.type].l:c.type),
      Number(cr.vol.toFixed(1)), c.ach||2, Number(cr.fv.toFixed(1)),
      Number(cr.classMin.toFixed(1)), cr.wcExt?Number(cr.wcExt.toFixed(1)):"N/A",
      cr.fv>=cr.classMin?"OK":"FAIL"]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(vh), "Ventilation");

  var yacht = m.yacht || "AC_Calc";
  try{
    XLSX.writeFile(wb, "Baltic_AC_" + yacht.replace(/[^a-z0-9]/gi,"_") + ".xlsx");
  } catch(err){
    var out = XLSX.write(wb,{bookType:"xlsx",type:"array"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([out],{type:"application/octet-stream"}));
    a.download = "Baltic_AC_" + yacht.replace(/[^a-z0-9]/gi,"_") + ".xlsx";
    a.click();
  }
}

function exportPDF(){
  if(!window.html2pdf){ window.print(); return; }
  var resultEl = el("results-card");
  var bodies = resultEl.querySelectorAll(".acc-body");
  var hdrs   = resultEl.querySelectorAll(".acc-hdr");
  bodies.forEach(function(b){ b.classList.add("open"); });
  hdrs.forEach(function(h){ h.classList.add("open"); });
  html2pdf().set({
    margin: 10,
    filename: "Baltic_AC_" + ((S.project.yacht||"report").replace(/[^a-z0-9]/gi,"_")) + "_" + (S.project.date||"") + ".pdf",
    image: {type:"jpeg", quality:0.98},
    html2canvas: {scale:2, useCORS:true, logging:false},
    jsPDF: {orientation:"landscape", unit:"mm", format:"a4"}
  }).from(resultEl).save().then(function(){
    bodies.forEach(function(b){ b.classList.remove("open"); });
    hdrs.forEach(function(h){ h.classList.remove("open"); });
  });
}

window.addEventListener("DOMContentLoaded", init);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AC Cooling Calculator – Baltic Yachts</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AC Calc">
<meta name="theme-color" content="#1a2744">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ── RESET & TOKENS ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744; --navy2:#243350; --navy3:#2e4168;
  --gold:#c9a96e; --gold2:#e0c899; --gold-bg:#fdf6ec;
  --white:#fff; --bg:#f4f5f8;
  --g100:#f0f2f5; --g200:#e4e7ec; --g300:#d0d5dd;
  --g500:#667085; --g700:#344054; --text:#1d2939;
  --green:#12b76a; --green-bg:#d1fae5; --green-dark:#065f46;
  --red:#f04438; --red-bg:#fee2e2; --red-dark:#991b1b;
  --amber:#f79009; --amber-bg:#fef3c7;
  --r:8px; --r2:4px;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.07);
  --sh2:0 4px 20px rgba(26,39,68,.14);
}
body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
header{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.hdr{max-width:1440px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo-wrap{display:flex;align-items:center;gap:16px}
.hdr-title h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:.3px}
.hdr-btns{display:flex;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.25)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-link{background:none;border:none;color:var(--g500);font-size:12px;padding:4px 8px;cursor:pointer}
.btn-link:hover{color:var(--navy)}
.settings-bar{background:var(--white);border-bottom:1px solid var(--g200);position:sticky;top:68px;z-index:150}
.sb-inner{max-width:1440px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sb-group{display:flex;flex-direction:column;gap:4px}
.sb-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500)}
.toggle{display:flex;border:1.5px solid var(--g300);border-radius:var(--r2);overflow:hidden;height:32px}
.toggle button{padding:0 14px;border:none;background:var(--white);color:var(--g700);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.toggle button.on{background:var(--navy);color:#fff}
.toggle button:not(:last-child){border-right:1.5px solid var(--g300)}
.sup-pick{display:flex;gap:5px;height:32px;flex-wrap:wrap}
.sup-btn{padding:0 12px;border:1.5px solid var(--g300);border-radius:var(--r2);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--g700)}
.sup-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--navy)}
.cop-inp{width:64px;padding:5px 8px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;font-weight:500;text-align:center}
.cop-inp:focus{outline:none;border-color:var(--navy)}
.sb-sep{width:1px;height:32px;background:var(--g200)}
.proj-toggle-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--g300);border-radius:var(--r2);background:var(--white);font-size:12px;cursor:pointer;color:var(--g700)}
.proj-toggle-btn:hover{border-color:var(--navy);color:var(--navy)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.proj-panel{background:var(--white);border-bottom:1px solid var(--g200);overflow:hidden;max-height:0;transition:max-height .35s ease}
.proj-panel.open{max-height:350px}
.proj-grid{max-width:1440px;margin:0 auto;padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.proj-actions{max-width:1440px;margin:0 auto;padding:12px 24px 16px;display:flex;gap:10px;border-top:1px solid var(--g200);flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g500)}
.field input,.field select{padding:7px 10px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;color:var(--text);transition:border-color .15s;width:100%;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy)}
main{max-width:1440px;margin:0 auto;padding:20px 24px;display:grid;gap:16px}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.card-hdr{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200)}
.card-hdr h2{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px}
.card-hdr-right{display:flex;align-items:center;gap:8px}
.badge{background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge-gold{background:var(--gold);color:var(--navy)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--g100);padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g200);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(26,39,68,.02)}
.ti{padding:5px 8px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;background:#fff;transition:border-color .15s;width:100%}
.ti:focus{outline:none;border-color:var(--navy)}
.ti-name{min-width:140px}
.ti-type{min-width:160px}
.ti-num{max-width:58px;text-align:right}
.tc{text-align:center}
.tc input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.p-ok{background:var(--green-bg);color:var(--green-dark)}
.p-warn{background:#fef3c7;color:#92400e}
.p-err{background:var(--red-bg);color:var(--red-dark)}
.p-dim{background:var(--g100);color:var(--g500)}
.tbl-footer{padding:10px 16px;background:var(--g100);border-top:1px solid var(--g200);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.icon-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--g500);border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.icon-btn:hover{background:var(--red-bg);color:var(--red)}
.humidity-section{padding:16px;background:var(--g100);border-radius:var(--r2);margin:12px 16px}
.humidity-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:10px}
.humidity-cell{padding:12px;background:var(--white);border-radius:var(--r2);border-left:3px solid var(--gold)}
.humidity-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g500);margin-bottom:4px}
.humidity-val{font-size:18px;font-weight:700;color:var(--navy)}
.humidity-unit{font-size:11px;color:var(--g500);margin-top:2px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:16px}
.kpi{padding:12px 16px;background:var(--bg);border-radius:var(--r2);border-left:3px solid var(--gold)}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);margin-bottom:4px}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-u{font-size:11px;color:var(--g500);margin-top:2px}
.result-table th{background:var(--navy);color:#fff}
.result-table tbody tr:nth-child(even) td{background:rgba(26,39,68,.025)}
.result-table tfoot td{background:var(--navy);color:#fff;font-weight:600;padding:9px 10px}
.energy-section{padding:16px}
.energy-total{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:4px}
.energy-sub{font-size:12px;color:var(--g500);margin-bottom:16px}
.energy-bars{display:grid;gap:10px}
.e-bar-row{display:grid;grid-template-columns:120px 1fr 70px;align-items:center;gap:12px}
.e-bar-label{font-size:12px;color:var(--g700);font-weight:500}
.e-bar-track{height:20px;background:var(--g200);border-radius:3px;overflow:hidden;position:relative}
.e-bar-fill{height:100%;border-radius:3px;position:relative;transition:width .4s ease}
.e-bar-fill::after{content:attr(data-label);position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.e-bar-day{background:var(--navy)}
.e-bar-sil{background:var(--gold)}
.e-bar-red{background:var(--g300)}
.e-bar-val{font-size:13px;font-weight:600;color:var(--navy);text-align:right}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;user-select:none;border-top:1px solid var(--g200)}
.acc-hdr:hover{background:var(--g100)}
.acc-hdr h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500)}
.acc-hdr .chevron{font-size:12px;color:var(--g500);transition:transform .2s}
.acc-body{overflow:hidden;max-height:0;transition:max-height .3s ease}
.acc-body.open{max-height:4000px}
.acc-body .inner{padding:0 0 16px}
.acc-hdr.open .chevron{transform:rotate(180deg)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;backdrop-filter:blur(2px)}
.overlay.show{display:block}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:var(--r);box-shadow:var(--sh2);z-index:600;width:min(720px,95vw);max-height:85vh;flex-direction:column}
.modal.show{display:flex}
.modal-hdr{padding:16px 20px;background:var(--navy);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:14px;font-weight:700;color:#fff;letter-spacing:.5px}
.modal-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:4px;transition:all .15s}
.modal-close:hover{background:rgba(255,255,255,.1);color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.sup-table{width:100%;border-collapse:collapse;font-size:13px}
.sup-table th{padding:8px 10px;background:var(--g100);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g200);text-align:left}
.sup-table td{padding:7px 10px;border-bottom:1px solid var(--g100)}
.sup-table tr:hover td{background:var(--g100)}
.sup-inp{padding:4px 7px;border:1.5px solid var(--g300);border-radius:3px;font-size:12px;width:100%}
.sup-inp:focus{outline:none;border-color:var(--navy)}
.add-unit-row{display:flex;gap:8px;padding:10px 0 0;align-items:flex-end;flex-wrap:wrap}
.add-unit-row .field{flex:1;min-width:120px}
.empty{text-align:center;padding:40px 20px;color:var(--g500)}
.empty .icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px}
.section-sep{padding:12px 20px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);border-top:1px solid var(--g200);background:var(--white)}
@media print{
  .settings-bar,.hdr-btns,.tbl-footer,.icon-btn,.no-print,.overlay,.modal{display:none!important}
  header{position:static!important}
  .proj-panel{max-height:none!important}
  main{padding:20px!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important;page-break-inside:avoid;margin-bottom:20px}
  .card-hdr{background:var(--navy)!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .card-hdr h2{color:white!important}
  .acc-body{max-height:none!important}
  th,.result-table th{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .result-table tfoot td{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:1.5cm;size:A4 landscape}
}
@media (max-width:900px){
  .hdr-title p{display:none}
  .sb-inner{padding:8px 12px;gap:10px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .sb-group{flex-shrink:0}
  .sb-sep{display:none}
  .proj-grid{grid-template-columns:1fr 1fr;padding:12px;gap:10px}
  main{padding:12px;gap:12px}
  .kpi-row{grid-template-columns:1fr 1fr;padding:12px;gap:8px}
  .kpi-v{font-size:18px}
  .modal{width:96vw;max-height:88vh}
}
@media (max-width:600px){
  .hdr{height:52px}
  .hdr-title h1{font-size:13px}
  .hdr-btns .btn-ghost{display:none}
  main{padding:10px;gap:10px}
  .kpi-row{grid-template-columns:1fr 1fr;padding:10px;gap:7px}
  .kpi{padding:10px 12px}
  .kpi-v{font-size:16px}
  th,td{padding:6px 7px;font-size:12px}
  .modal{width:98vw;max-height:92vh;top:4%}
  .ti,.ti-name,.ti-type{font-size:16px}
  select.ti{font-size:16px}
}
</style>
</head>
<body>

<header>
<div class="hdr">
  <div class="logo-wrap">
    <svg viewBox="0 0 130 44" xmlns="http://www.w3.org/2000/svg" style="width:130px;height:44px">
      <text x="0" y="28" font-family="Georgia,'Times New Roman',serif" font-size="24" font-weight="700" fill="#c9a96e" letter-spacing="3.5">BALTIC</text>
      <line x1="0" y1="33" x2="126" y2="33" stroke="#c9a96e" stroke-width="0.5" opacity="0.6"/>
      <text x="2" y="43" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="rgba(255,255,255,0.8)" letter-spacing="9">YACHTS</text>
    </svg>
    <div class="hdr-title"><h1>AC Cooling Calculator</h1></div>
  </div>
  <div class="hdr-btns no-print">
    <button class="btn btn-ghost btn-sm" onclick="exportExcel()">⬇ Excel</button>
    <button class="btn btn-ghost btn-sm" onclick="exportPDF()">📄 PDF</button>
    <button class="btn btn-gold btn-sm" onclick="window.print()">🖨 Print</button>
  </div>
</div>
</header>

<div class="settings-bar no-print">
<div class="sb-inner">
  <button class="proj-toggle-btn" id="proj-btn" onclick="toggleProj()">📋 Project <span id="proj-chevron">▾</span></button>
  <div class="sb-sep"></div>
  <div class="sb-group">
    <label>Climate</label>
    <div class="toggle">
      <button id="btn-med" class="on" onclick="setClimate('med')">Mediterranean</button>
      <button id="btn-trop" onclick="setClimate('trop')">Tropical</button>
    </div>
  </div>
  <div class="sb-group">
    <label>FAMU</label>
    <div class="toggle">
      <button id="btn-famu-n" class="on" onclick="setFAMU(false)">No</button>
      <button id="btn-famu-y" onclick="setFAMU(true)">Yes</button>
    </div>
  </div>
  <div class="sb-group">
    <label>Supplier <button class="btn-link btn-xs" onclick="openSupplierModal()">⚙ Edit</button></label>
    <div class="sup-pick" id="sup-pick"></div>
  </div>
  <div class="sb-group">
    <label>COP</label>
    <input type="number" class="cop-inp" id="cop" value="3.0" min="1.5" max="6" step="0.1" oninput="recalc()">
  </div>
</div>
</div>

<div class="proj-panel" id="proj-panel">
  <div class="proj-grid" id="proj-grid"></div>
  <div class="proj-actions">
    <button class="btn btn-primary btn-sm" onclick="saveProject()">💾 Save</button>
    <button class="btn btn-ghost btn-sm" onclick="openProjectModal()">📂 Load</button>
    <button class="btn btn-ghost btn-sm" onclick="newProject()">🆕 New</button>
  </div>
</div>

<main id="main-content"></main>

<!-- Project modal -->
<div class="overlay" id="proj-overlay" onclick="closeProjectModal()"></div>
<div class="modal" id="proj-modal">
  <div class="modal-hdr"><h2>📂 Load Project</h2><button class="modal-close" onclick="closeProjectModal()">✕</button></div>
  <div class="modal-body"><div id="projects-list" style="display:grid;gap:10px"></div></div>
  <div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeProjectModal()">Close</button></div>
</div>

<!-- Supplier modal -->
<div class="overlay" id="sup-overlay" onclick="closeSupplierModal()"></div>
<div class="modal" id="sup-modal">
  <div class="modal-hdr"><h2>⚙ Supplier Catalog — <span id="modal-sup-name">—</span></h2><button class="modal-close" onclick="closeSupplierModal()">✕</button></div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap" id="modal-sup-tabs"></div>
    <div style="margin-bottom:12px;display:flex;gap:10px">
      <button class="btn btn-sm" style="background:var(--g100)" onclick="document.getElementById('csv-upload').click()">📤 Import CSV/JSON</button>
      <input type="file" id="csv-upload" style="display:none" accept=".csv,.json" onchange="importSupplierData(event)">
    </div>
    <table class="sup-table" id="sup-edit-tbl">
      <thead><tr><th>Model</th><th>BTU/h</th><th>Weight kg</th><th class="no-print" style="width:50px"></th></tr></thead>
      <tbody id="sup-edit-body"></tbody>
    </table>
    <div class="add-unit-row">
      <div class="field"><label>Model</label><input class="sup-inp" id="new-model" placeholder="e.g. EVA30"></div>
      <div class="field"><label>BTU/h</label><input class="sup-inp" type="number" id="new-btu" placeholder="30000"></div>
      <div class="field"><label>Weight kg</label><input class="sup-inp" type="number" id="new-kg" placeholder="20"></div>
      <button class="btn btn-primary btn-sm" onclick="addSupplierUnit()" style="flex-shrink:0;height:32px;margin-bottom:0">+ Add</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost btn-sm" onclick="exportSupplierCSV()">⬇ Export CSV</button>
    <button class="btn btn-primary btn-sm" onclick="closeSupplierModal()">Done</button>
  </div>
</div>

<footer style="background:var(--navy);color:rgba(255,255,255,.45);text-align:center;padding:14px;font-size:11px;margin-top:24px">
  <strong style="color:var(--gold)">Baltic Yachts Ltd</strong> — Engineering Department · AC Cooling Calculator v3.1 · ISO 7547
</footer>

<script>
// ═══════════════════════════════════════════════
// AC COOLING CALCULATOR v3.1  (bug-fix release)
// Key fix: addCabin no longer duplicates rows
// ═══════════════════════════════════════════════

// ── DATA ────────────────────────────────────────
const TYPES = {
  owners:    {l:"Owner's Cabin",       med:80,  trop:250, ach:1.5},
  captains:  {l:"Captain's Cabin",     med:100, trop:270, ach:2.0},
  guest:     {l:"Guest Stateroom",     med:120, trop:290, ach:2.0},
  guest_l:   {l:"Guest Stateroom (Lrg)",med:150,trop:310, ach:2.0},
  crew:      {l:"Crew Cabin",          med:120, trop:250, ach:2.5},
  crew_mess: {l:"Crew Mess",           med:150, trop:290, ach:3.0},
  salon:     {l:"Salon",               med:150, trop:310, ach:2.0},
  wheelhouse:{l:"Wheelhouse",          med:180, trop:330, ach:3.0},
  galley:    {l:"Galley",              med:220, trop:330, ach:8.0},
  laundry:   {l:"Laundry",            med:250, trop:350, ach:5.0},
  engine:    {l:"Engine Room",         med:300, trop:350, ach:0  },
  technical: {l:"Technical",           med:200, trop:310, ach:3.0},
  other:     {l:"Other",              med:130, trop:290, ach:2.0}
};

const CLIMATE = {
  med: {

// ── CALCULATIONS ─────────────────────────────────
function calcCabin(c) {
  const area=+c.area||0, h=+c.h||2.1, p=+c.p||0, ach=+c.ach||2, wc=!!c.wc;
  const t = TYPES[c.type] || TYPES.other;
  const cli = CLIMATE[S.climate];
  const wm2 = S.climate === 'med' ? t.med : t.trop;
  const vol = area * h;
  const fv = Math.max((vol * ach) / 3.6, p * 7, area > 0 ? 3 : 0);
  const wcExt = wc ? Math.max(area * 4.5, 15) : 0;
  const dH_d = S.famu ? cli.famu.cabin_dH : cli.day.dH;
  const vH_d = 1.29 * 1.01 * fv * dH_d;
  const base_d = wm2 * area;
  const pers = p * 150;
  const inst = 10 * area;
  const totW_d = base_d + vH_d + pers + inst;
  const totB_d = totW_d * 3.41214;
  const classMin = Math.max(p * 7, vol * 0.5 / 3.6);
  return {area, h, p, ach, wc, wm2, vol, fv, wcExt, base_d, vH_d, pers, inst, totW_d, totB_d, classMin};
}

function calcEnergy(unitBTU) {
  const cop = +document.getElementById('cop').value || 3;
  const eKW = (unitBTU / 3412) / cop;
  return { eKW, day: eKW*12, sil: eKW*0.55*8, red: eKW*0.05*4, get tot(){ return this.day+this.sil+this.red; } };
}

function recUnit(btu) {
  const units = [...SUPS[S.sup].u].sort((a,b) => a.b - b.b);
  return units.find(u => u.b >= btu) || units[units.length-1] || {m:'—', b:0, w:0};
}

// addCabin: push to array, append ONE row — no more duplicates
function addCabin(data) {
  const id = S.nid++;
  const c = data ? {...data, id} : {id, name:'', type:'guest', area:'', h:2.1, p:2, wc:true, ach:2.0};
  S.cabins.push(c);
  appendRow(c);         // ← only adds the new row
  updateRowNumbers();
  updateCabinBadge();
  recalc();
}

function addPreset(key) {
  addCabin({...PRESETS[key]});
}

function removeRow(id) {
  S.cabins = S.cabins.filter(c => c.id !== id);
  document.getElementById('r' + id)?.remove();
  if (!S.cabins.length) {
    const tbody = document.getElementById('cabin-body');
    tbody.innerHTML = '<tr id="empty-row"><td colspan="11"><div class="empty"><div class="icon">🚢</div><p>Click <strong>+ Add Space</strong> to begin</p></div></td></tr>';
    document.getElementById('results-card').style.display = 'none';
  }
  updateRowNumbers();
  updateCabinBadge();
  recalc();
}

function updateRowNumbers() {
  S.cabins.forEach((c, i) => {
    const cell = document.querySelector(`#r${c.id} .row-num`);
    if (cell) cell.textContent = i + 1;
  });
}

function updateCabinBadge() {
  const n = S.cabins.length;
  const el = document.getElementById('cabin-badge');
  if (el) el.textContent = n + (n === 1 ? ' space' : ' spaces');
}

function upd(id, field, val) {
  const c = S.cabins.find(c => c.id === id);
  if (c) { c[field] = val; recalc(); }
}

function updType(id, type) {
  const c = S.cabins.find(c => c.id === id);
  if (!c) return;
  c.type = type;
  // Auto-update ACH to type default
  const achEl = document.getElementById('ach' + id);
  if (achEl && TYPES[type]) { achEl.value = TYPES[type].ach; c.ach = TYPES[type].ach; }
  recalc();
}

// ── MAIN RECALCULATE ─────────────────────────────
function recalc() {
  if (!S.cabins.length) {
    document.getElementById('results-card').style.display = 'none';
    return;
  }

  const rows = S.cabins.map((c, i) => {
    const cr = calcCabin(c);
    const unit = recUnit(cr.totB_d);
    const e = calcEnergy(unit.b);
    const ok = unit.b >= cr.totB_d;
    const margin = unit.b ? ((unit.b - cr.totB_d) / cr.totB_d * 100) : 0;

    // Update cabin table cells
    const cnEl = document.getElementById('cn' + c.id);
    if (cnEl) cnEl.textContent = f1(cr.totW_d / 1000) + ' kW';
    const stEl = document.getElementById('st' + c.id);
    if (stEl) stEl.innerHTML = unit.b
      ? (ok ? `<span class="pill p-ok">✓ +${Math.round(margin)}%</span>`
             : `<span class="pill p-err">✗ ${Math.round(margin)}%</span>`)
      : '<span class="pill p-dim">—</span>';

    return {c, cr, unit, e, ok, margin, idx: i};
  });

  const totW    = rows.reduce((s,r) => s + r.cr.totW_d, 0);
  const totB    = rows.reduce((s,r) => s + r.cr.totB_d, 0);
  const totInst = rows.reduce((s,r) => s + r.unit.b, 0);
  const totKg   = rows.reduce((s,r) => s + r.unit.w, 0);
  const totEd   = rows.reduce((s,r) => s + r.e.day, 0);
  const totEs   = rows.reduce((s,r) => s + r.e.sil, 0);
  const totEr   = rows.reduce((s,r) => s + r.e.red, 0);
  const totEt   = totEd + totEs + totEr;
  const cop     = +document.getElementById('cop').value || 3;
  const totEkW  = (totInst / 3412) / cop;

  document.getElementById('results-card').style.display = '';
  document.getElementById('res-badge').textContent = f0(Math.round(totB)) + ' BTU · ' + f1(totW/1000) + ' kW';

  renderKPIs(totW, totB, totInst, totKg, totEt, totEkW, rows.length);
  renderEquip(rows, totB, totInst, totKg);
  renderHumidity();
  renderEnergy(totEd, totEs, totEr, totEt);
  renderTech(rows, totW, totB);
  renderVent(rows);
  renderConditions();
}

function renderEquip(rows, totB, totInst, totKg) {

// ── CONTROLS ─────────────────────────────────────
function setClimate(c) {
  S.climate = c;
  document.getElementById('btn-med').classList.toggle('on', c === 'med');
  document.getElementById('btn-trop').classList.toggle('on', c === 'trop');
  recalc();
}

function setFAMU(v) {
  S.famu = v;
  document.getElementById('btn-famu-n').classList.toggle('on', !v);
  document.getElementById('btn-famu-y').classList.toggle('on',  v);
  recalc();
}

function setSup(sup) {
  S.sup = sup;
  renderSupplierButtons();
  recalc();
}

function renderSupplierButtons() {
  document.getElementById('sup-pick').innerHTML = Object.keys(SUPS)
    .map(k => `<button class="sup-btn${S.sup===k?' on':''}" onclick="setSup('${k}')">${SUPS[k].n}</button>`).join('');
}

// ── SUPPLIER MODAL ────────────────────────────────
let modalSup = 'VECO';

function openSupplierModal() {
  modalSup = S.sup;
  renderSupplierModalTabs();
  renderSupplierEditor();
  document.getElementById('sup-overlay').classList.add('show');
  document.getElementById('sup-modal').classList.add('show');
}

function closeSupplierModal() {
  document.getElementById('sup-overlay').classList.remove('show');
  document.getElementById('sup-modal').classList.remove('show');
  saveSuppliersToStorage();
  renderSupplierButtons();
  recalc();
}

function renderSupplierModalTabs() {
  document.getElementById('modal-sup-tabs').innerHTML = Object.keys(SUPS)
    .map(k => `<button class="sup-btn${k===modalSup?' on':''}" onclick="switchSupplierTab('${k}')">${SUPS[k].n}</button>`).join('');
  document.getElementById('modal-sup-name').textContent = SUPS[modalSup].n;
}

function switchSupplierTab(k) {
  modalSup = k;
  renderSupplierModalTabs();
  renderSupplierEditor();
}

function renderSupplierEditor() {
  const units = [...SUPS[modalSup].u].sort((a,b) => a.b - b.b);
  document.getElementById('sup-edit-body').innerHTML = units.map((u,i) => `
    <tr>
      <td><input type="text" value="${esc(u.m)}" class="sup-inp" onchange="SUPS['${modalSup}'].u[${i}].m=this.value"></td>
      <td><input type="number" value="${u.b}" class="sup-inp" onchange="SUPS['${modalSup}'].u[${i}].b=+this.value"></td>
      <td><input type="number" value="${u.w}" class="sup-inp" onchange="SUPS['${modalSup}'].u[${i}].w=+this.value"></td>
      <td class="no-print"><button class="icon-btn" onclick="SUPS['${modalSup}'].u.splice(${i},1);renderSupplierEditor()">✕</button></td>
    </tr>`).join('');
}

function addSupplierUnit() {
  const m = document.getElementById('new-model').value.trim();
  const b = +document.getElementById('new-btu').value;
  const w = +document.getElementById('new-kg').value;
  if (!m || !b) { alert('Enter model name and BTU/h'); return; }
  SUPS[modalSup].u.push({m, b, w});
  SUPS[modalSup].u.sort((a,b) => a.b - b.b);
  ['new-model','new-btu','new-kg'].forEach(id => document.getElementById(id).value = '');
  renderSupplierEditor();
}

function exportSupplierCSV() {
  const rows = ['model,btu,weight', ...SUPS[modalSup].u.map(u => `${u.m},${u.b},${u.w}`)];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${SUPS[modalSup].n}_catalog.csv`;
  a.click();
}

function importSupplierData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      let data;
      if (file.name.endsWith('.json')) {
        data = JSON.parse(evt.target.result);
      } else {
        const lines = evt.target.result.trim().split('\n');
        const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
        data = lines.slice(1).map(line => {
          const vals = line.split(',').map(v => v.trim());
          const obj = {};
          headers.forEach((h,i) => obj[h] = vals[i]);
          return obj;
        });
      }
      if (Array.isArray(data)) {
        SUPS[modalSup].u = data.map(r => ({m:r.model||r.name||r.m||'', b:+(r.btu||r.capacity||r.b)||0, w:+(r.weight||r.w)||0}));
        SUPS[modalSup].u.sort((a,b) => a.b - b.b);
        renderSupplierEditor();
        alert('Imported ' + SUPS[modalSup].u.length + ' units successfully!');
      }
    } catch(err) { alert('Import error: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function saveSuppliersToStorage() { localStorage.setItem('ac_suppliers', JSON.stringify(SUPS)); }
function loadSuppliersFromStorage() {
  const s = localStorage.getItem('ac_suppliers');
  if (s) { try { SUPS = JSON.parse(s); } catch(e){} }
}

// ── EXPORTS ───────────────────────────────────────
function exportExcel() {
  if (!window.XLSX) { alert('Excel library still loading, please wait.'); return; }
  const wb = XLSX.utils.book_new();
  const m = S.project;
  const cli = CLIMATE[S.climate];
  const cop = +document.getElementById('cop').value || 3;

  const info = [
    ['Baltic Yachts — AC Cooling Calculator v3.1 (ISO 7547)'],
    ['Yacht', m.yacht, '', 'Date', m.date],
    ['Project', m.proj, '', 'By', m.by],
    ['Revision', m.rev, '', 'Client', m.client],
    ['Climate', cli.label, '', 'FAMU', S.famu?'Yes':'No'],
    ['Supplier', SUPS[S.sup].n, '', 'COP', cop], [],
    ['#','Space','Type','Area m²','Persons','W/m²','Cooling W','BTU/h','Unit','Unit BTU','Weight kg']
  ];

  const dataRows = S.cabins.map((c,i) => {
    const cr = calcCabin(c);
    const u = recUnit(cr.totB_d);
    return [i+1, c.name||(TYPES[c.type]?.l||c.type), TYPES[c.type]?.l||c.type,
      cr.area, cr.p, cr.wm2, Math.round(cr.totW_d), Math.round(cr.totB_d), u.m, u.b, u.w];
  });

  const totW = S.cabins.reduce((s,c) => s + calcCabin(c).totW_d, 0);
  const totB = S.cabins.reduce((s,c) => s + calcCabin(c).totB_d, 0);
  dataRows.push([], ['','','TOTAL','','','', Math.round(totW), Math.round(totB)]);

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([...info, ...dataRows]), 'Cooling Loads');

   const eh=[['#','Space','Unit BTU','Installed kW','Elec kW','Day kWh','Silent kWh','Reduced kWh','Daily kWh']];
  S.cabins.forEach((c,i)=>{
    const cr=calcCabin(c); const u=recUnit(cr.totB_d); const e=calcEnergy(u.b);
    eh.push([i+1,c.name||(TYPES[c.type]?.l||c.type),u.b,+(u.b/3412).toFixed(2),+e.eKW.toFixed(2),+e.day.toFixed(2),+e.sil.toFixed(2),+e.red.toFixed(2),+e.tot.toFixed(2)]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(eh),'Energy');

  const vh=[['#','Space','Vol m³','ACH','Flow l/s','Class Min l/s','WC Ext l/s','OK?']];
  S.cabins.forEach((c,i)=>{
    const cr=calcCabin(c);
    vh.push([i+1,c.name||(TYPES[c.type]?.l||c.type),+cr.vol.toFixed(1),c.ach||2,+cr.fv.toFixed(1),+cr.classMin.toFixed(1),cr.wcExt?+cr.wcExt.toFixed(1):'N/A',cr.fv>=cr.classMin?'OK':'FAIL']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(vh),'Ventilation');

  const yacht=m.yacht||'AC_Calc';
  try {
    XLSX.writeFile(wb,`Baltic_AC_${yacht.replace(/[^a-z0-9]/gi,'_')}.xlsx`);
  } catch(e) {
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([out],{type:'application/octet-stream'}));
    a.download=`Baltic_AC_${yacht.replace(/[^a-z0-9]/gi,'_')}.xlsx`;
    a.click();
  }
}

function exportPDF() {
  if (!window.html2pdf) { window.print(); return; }
  const el = document.getElementById('results-card');
  // Temporarily open all accordions for export
  const bodies = el.querySelectorAll('.acc-body');
  const hdrs   = el.querySelectorAll('.acc-hdr');
  bodies.forEach(b => b.classList.add('open'));
  hdrs.forEach(h => h.classList.add('open'));
  html2pdf().set({
    margin: 10,
    filename: `Baltic_AC_${(S.project.yacht||'report').replace(/[^a-z0-9]/gi,'_')}_${S.project.date||''}.pdf`,
    image: {type:'jpeg', quality:0.98},
    html2canvas: {scale:2, useCORS:true, logging:false},
    jsPDF: {orientation:'landscape', unit:'mm', format:'a4'}
  }).from(el).save().then(()=>{
    // Restore accordion state
    bodies.forEach(b => b.classList.remove('open'));
    hdrs.forEach(h => h.classList.remove('open'));
  });
}

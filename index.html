<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AC Cooling – Baltic Yachts</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AC Calc">
<meta name="theme-color" content="#1a2744">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://html2pdf.github.io/html2pdf.bundle.min.js"></script>
<style>
/* ── RESET & TOKENS ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744; --navy2:#243350; --navy3:#2e4168;
  --gold:#c9a96e; --gold2:#e0c899; --gold-bg:#fdf6ec;
  --white:#fff; --bg:#f4f5f8;
  --g100:#f0f2f5; --g200:#e4e7ec; --g300:#d0d5dd;
  --g500:#667085; --g700:#344054; --text:#1d2939;
  --green:#12b76a; --green-bg:#d1fae5; --green-dark:#065f46;
  --red:#f04438; --red-bg:#fee2e2; --red-dark:#991b1b;
  --amber:#f79009; --amber-bg:#fef3c7;
  --r:8px; --r2:4px;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.07);
  --sh2:0 4px 20px rgba(26,39,68,.14);
}
body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* ── HEADER ─────────────────────────────────────────  */
header{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.hdr{max-width:1440px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo-wrap{display:flex;align-items:center;gap:16px}
.hdr-title h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:.3px}
.hdr-btns{display:flex;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.25)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ── SETTINGS BAR ───────────────────────────────────  */
.settings-bar{background:var(--white);border-bottom:1px solid var(--g200);position:sticky;top:68px;z-index:150}
.sb-inner{max-width:1440px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sb-group{display:flex;flex-direction:column;gap:4px}
.sb-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500)}
.toggle{display:flex;border:1.5px solid var(--g300);border-radius:var(--r2);overflow:hidden;height:32px}
.toggle button{padding:0 14px;border:none;background:var(--white);color:var(--g700);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.toggle button.on{background:var(--navy);color:#fff}
.toggle button:not(:last-child){border-right:1.5px solid var(--g300)}
.sup-pick{display:flex;gap:5px;height:32px;flex-wrap:wrap}
.sup-btn{padding:0 12px;border:1.5px solid var(--g300);border-radius:var(--r2);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--g700)}
.sup-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--navy)}
.cop-inp{width:64px;padding:5px 8px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;font-weight:500;text-align:center}
.cop-inp:focus{outline:none;border-color:var(--navy)}
.sb-sep{width:1px;height:32px;background:var(--g200)}
.proj-toggle-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--g300);border-radius:var(--r2);background:var(--white);font-size:12px;cursor:pointer;color:var(--g700)}
.proj-toggle-btn:hover{border-color:var(--navy);color:var(--navy)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* ── PROJECT PANEL ────────────────────────────────── */
.proj-panel{background:var(--white);border-bottom:1px solid var(--g200);overflow:hidden;max-height:0;transition:max-height .35s ease}
.proj-panel.open{max-height:350px}
.proj-grid{max-width:1440px;margin:0 auto;padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.proj-actions{max-width:1440px;margin:0 auto;padding:12px 24px 16px;display:flex;gap:10px;border-top:1px solid var(--g200);flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g500)}
.field input,.field select{padding:7px 10px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;color:var(--text);transition:border-color .15s;width:100%;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy)}

/* ── MAIN ────────────────────────────────────────────  */
main{max-width:1440px;margin:0 auto;padding:20px 24px;display:grid;gap:16px}

/* ── SECTION CARD ───────────────────────────────────���  */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.card-hdr{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200)}
.card-hdr h2{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px}
.card-hdr-right{display:flex;align-items:center;gap:8px}
.badge{background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge-gold{background:var(--gold);color:var(--navy)}

/* ── CABIN TABLE ─────────────────────────────────────  */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--g100);padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g200);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(26,39,68,.02)}
.ti{padding:5px 8px;border:1.5px solid var(--g300);border-radius:var(--r2);font-size:13px;background:#fff;transition:border-color .15s;width:100%}
.ti:focus{outline:none;border-color:var(--navy)}
.ti-name{min-width:140px}
.ti-type{min-width:160px}
.ti-num{max-width:58px;text-align:right}
.tc{text-align:center}
.tc input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.p-ok{background:var(--green-bg);color:var(--green-dark)}
.p-warn{background:#fef3c7;color:#92400e}
.p-err{background:var(--red-bg);color:var(--red-dark)}
.tbl-footer{padding:10px 16px;background:var(--g100);border-top:1px solid var(--g200);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.icon-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--g500);border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.icon-btn:hover{background:var(--red-bg);color:var(--red)}

/* ── HUMIDITY SECTION ──────────────────────────────  */
.humidity-section{padding:16px;background:var(--g100);border-radius:var(--r2);margin-top:12px}
.humidity-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:10px}
.humidity-cell{padding:12px;background:var(--white);border-radius:var(--r2);border-left:3px solid var(--gold)}
.humidity-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g500);margin-bottom:4px}
.humidity-val{font-size:18px;font-weight:700;color:var(--navy)}
.humidity-unit{font-size:11px;color:var(--g500);margin-top:2px}

/* ── RESULTS ─────────────────────────────────────────  */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:16px}
.kpi{padding:12px 16px;background:var(--bg);border-radius:var(--r2);border-left:3px solid var(--gold)}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);margin-bottom:4px}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-u{font-size:11px;color:var(--g500);margin-top:2px}
.result-table th{background:var(--navy);color:#fff}
.result-table tbody tr:nth-child(even) td{background:rgba(26,39,68,.025)}
.result-table tfoot td{background:var(--navy);color:#fff;font-weight:600;padding:9px 10px}

/* ── ENERGY BAR CHART ────────────────────────────────  */
.energy-section{padding:16px}
.energy-total{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:4px}
.energy-sub{font-size:12px;color:var(--g500);margin-bottom:16px}
.energy-bars{display:grid;gap:10px}
.e-bar-row{display:grid;grid-template-columns:120px 1fr 70px;align-items:center;gap:12px}
.e-bar-label{font-size:12px;color:var(--g700);font-weight:500}
.e-bar-track{height:20px;background:var(--g200);border-radius:3px;overflow:hidden;position:relative}
.e-bar-fill{height:100%;border-radius:3px;position:relative;transition:width .4s ease}
.e-bar-fill::after{content:attr(data-label);position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.e-bar-day{background:var(--navy)}
.e-bar-sil{background:var(--gold)}
.e-bar-red{background:var(--g300)}
.e-bar-val{font-size:13px;font-weight:600;color:var(--navy);text-align:right}

/* ── ACCORDION ──────────────────────────────────────  */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;user-select:none;border-top:1px solid var(--g200)}
.acc-hdr:hover{background:var(--g100)}
.acc-hdr h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500)}
.acc-hdr .chevron{font-size:12px;color:var(--g500);transition:transform .2s}
.acc-body{overflow:hidden;max-height:0;transition:max-height .3s ease}
.acc-body.open{max-height:4000px}
.acc-body .inner{padding:0 0 16px}
.acc-hdr.open .chevron{transform:rotate(180deg)}

/* ── MODAL ──────────────────────────────────────────  */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;backdrop-filter:blur(2px)}
.overlay.show{display:block}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:var(--r);box-shadow:var(--sh2);z-index:600;width:min(720px,95vw);max-height:85vh;flex-direction:column}
.modal.show{display:flex}
.modal-hdr{padding:16px 20px;background:var(--navy);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:14px;font-weight:700;color:#fff;letter-spacing:.5px}
.modal-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:4px;transition:all .15s}
.modal-close:hover{background:rgba(255,255,255,.1);color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.sup-table{width:100%;border-collapse:collapse;font-size:13px}
.sup-table th{padding:8px 10px;background:var(--g100);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g500);border-bottom:1px solid var(--g200);text-align:left}
.sup-table td{padding:7px 10px;border-bottom:1px solid var(--g100)}
.sup-table tr:hover td{background:var(--g100)}
.sup-inp{padding:4px 7px;border:1.5px solid var(--g300);border-radius:3px;font-size:12px;width:100%}
.sup-inp:focus{outline:none;border-color:var(--navy)}
.add-unit-row{display:flex;gap:8px;padding:10px 0 0;align-items:flex-end;flex-wrap:wrap}
.add-unit-row .field{flex:1;min-width:120px}

/* ── PRINT ────────────────────────────────────────────  */
@media print{
  .settings-bar,.hdr-btns,.tbl-footer,.icon-btn,.no-print,
  .overlay,.modal,header .hdr-btns{display:none!important}
  header{position:static!important;margin-bottom:0}
  .settings-bar{display:none!important}
  .proj-panel{max-height:none!important}
  main{padding:20px!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important;page-break-inside:avoid;margin-bottom:20px}
  .card-hdr{background:var(--navy)!important;color:white!important;padding:12px 16px!important;font-weight:700}
  .card-hdr h2{color:white!important}
  .acc-body{max-height:none!important}
  .acc-hdr{background:var(--g100)!important;font-weight:600}
  th,.result-table th{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;background:var(--navy)!important;color:white!important}
  .result-table tfoot td{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;background:var(--navy)!important;color:white!important}
  .section-sep{background:var(--g200)!important;font-weight:700!important;padding:10px 12px!important}
  @page{margin:1.5cm;size:A4 landscape}
}

/* ── EMPTY STATE ─────────────────────────────────────  */
.empty{text-align:center;padding:40px 20px;color:var(--g500)}
.empty .icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px}
.section-sep{padding:12px 20px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);border-top:1px solid var(--g200);background:var(--white)}

@media (max-width:900px){
  .hdr-title p{display:none}
  .sb-inner{padding:8px 12px;gap:10px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .sb-group{flex-shrink:0}
  .sb-sep{display:none}
  .proj-grid{grid-template-columns:1fr 1fr;padding:12px;gap:10px}
  main{padding:12px;gap:12px}
  .kpi-row{grid-template-columns:1fr 1fr;padding:12px;gap:8px}
  .kpi-v{font-size:18px}
  .humidity-row{grid-template-columns:1fr}
  .modal{width:96vw;max-height:88vh}
}
@media (max-width:600px){
  .hdr{height:52px}
  .hdr-title h1{font-size:13px}
  .hdr-btns .btn-ghost{display:none}
  main{padding:10px;gap:10px}
  .kpi-row{grid-template-columns:1fr 1fr;padding:10px;gap:7px}
  .kpi{padding:10px 12px}
  .kpi-v{font-size:16px}
  th,td{padding:6px 7px;font-size:12px}
  .modal{width:98vw;max-height:92vh;top:4%}
  .humidity-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
<div class="hdr">
  <div class="logo-wrap">
    <svg viewBox="0 0 130 44" xmlns="http://www.w3.org/2000/svg" style="width:130px;height:44px">
      <text x="0" y="28" font-family="Georgia,'Times New Roman',serif" font-size="24" font-weight="700" fill="#c9a96e" letter-spacing="3.5">BALTIC</text>
      <line x1="0" y1="33" x2="126" y2="33" stroke="#c9a96e" stroke-width="0.5" opacity="0.6"/>
      <text x="2" y="43" font-family="Georgia,'Times New Roman',serif" font-size="11" fill="rgba(255,255,255,0.8)" letter-spacing="9">YACHTS</text>
    </svg>
    <div class="hdr-title">
      <h1>AC Cooling Calculator</h1>
    </div>
  </div>
  <div class="hdr-btns no-print">
    <button class="btn btn-ghost btn-sm" onclick="exportExcel()">⬇ Excel</button>
    <button class="btn btn-ghost btn-sm" onclick="exportProfessionalPDF()">📄 PDF</button>
    <button class="btn btn-gold btn-sm" onclick="window.print()">🖨 Print</button>
  </div>
</div>
</header>

<!-- ─── SETTINGS BAR ─── -->
<div class="settings-bar no-print">
<div class="sb-inner">
  <button class="proj-toggle-btn" id="proj-btn" onclick="toggleProj()">📋 Project <span id="proj-chevron">▾</span></button>
  <div class="sb-sep"></div>
  <div class="sb-group">
    <label>Climate</label>
    <div class="toggle">
      <button id="btn-med" class="on" onclick="setClimate('med')">Mediterranean</button>
      <button id="btn-trop" onclick="setClimate('trop')">Tropical</button>
    </div>
  </div>
  <div class="sb-group">
    <label>FAMU</label>
    <div class="toggle">
      <button id="btn-famu-n" class="on" onclick="setFAMU(false)">No</button>
      <button id="btn-famu-y" onclick="setFAMU(true)">Yes</button>
    </div>
  </div>
  <div class="sb-group">
    <label>Supplier</label>
    <div class="sup-pick" id="sup-pick"></div>
  </div>
  <div class="sb-group">
    <label>COP</label>
    <input type="number" class="cop-inp" id="cop" value="3.0" min="1.5" max="6" step="0.1" oninput="recalc()">
  </div>
</div>
</div>

<!-- ─── PROJECT PANEL ─── -->
<div class="proj-panel" id="proj-panel">
<div class="proj-grid" id="proj-grid"></div>
<div class="proj-actions">
  <button class="btn btn-primary btn-sm" onclick="saveProject()">💾 Save</button>
  <button class="btn btn-ghost btn-sm" onclick="openProjectModal()">📂 Load</button>
  <button class="btn btn-ghost btn-sm" onclick="newProject()">🆕 New</button>
</div>
</div>

<!-- ─── MAIN CONTENT ─── -->
<main id="main-content"></main>

<!-- ─── PROJECT MODAL ─── -->
<div class="overlay" id="proj-overlay" onclick="closeProjectModal()"></div>
<div class="modal" id="proj-modal">
  <div class="modal-hdr"><h2>📂 Load Project</h2><button class="modal-close" onclick="closeProjectModal()">✕</button></div>
  <div class="modal-body"><div id="projects-list" style="display:grid;gap:10px"></div></div>
  <div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeProjectModal()">Close</button></div>
</div>

<!-- ─── SUPPLIER MODAL ─── -->
<div class="overlay" id="overlay" onclick="closeSupplierModal()"></div>
<div class="modal" id="sup-modal">
  <div class="modal-hdr"><h2>⚙ Supplier Catalog</h2><button class="modal-close" onclick="closeSupplierModal()">✕</button></div>
  <div class="modal-body">
    <div style="margin-bottom:20px">
      <strong style="color:var(--navy)">Import data:</strong>
      <div style="margin-top:10px;display:flex;gap:10px">
        <button class="btn btn-sm" style="background:var(--g100)" onclick="document.getElementById('csv-upload').click()">📤 Upload CSV/JSON</button>
        <input type="file" id="csv-upload" style="display:none" accept=".csv,.json" onchange="importSupplierData(event)">
      </div>
    </div>
    <table class="sup-table" id="sup-edit-tbl">
      <thead><tr><th>Model</th><th>BTU/h</th><th>Weight kg</th><th class="no-print" style="width:60px"></th></tr></thead>
      <tbody id="sup-edit-body"></tbody>
    </table>
    <div class="add-unit-row">
      <div class="field"><label>Model</label><input class="sup-inp" id="new-model" placeholder="e.g. EVA30"></div>
      <div class="field"><label>BTU/h</label><input class="sup-inp" type="number" id="new-btu" placeholder="30000"></div>
      <div class="field"><label>Weight kg</label><input class="sup-inp" type="number" id="new-kg" placeholder="20"></div>
      <button class="btn btn-primary btn-sm" onclick="addSupplierUnit()" style="flex-shrink:0;margin-bottom:0;height:32px">+ Add</button>
    </div>
  </div>
  <div class="modal-footer">
    <div style="font-size:12px;color:var(--g500)">Supplier: <strong id="modal-sup-name">—</strong></div>
    <button class="btn btn-primary btn-sm" onclick="closeSupplierModal()">Done</button>
  </div>
</div>

<footer style="background:var(--navy);color:rgba(255,255,255,.45);text-align:center;padding:14px;font-size:11px;margin-top:24px">
  <strong style="color:var(--gold)">Baltic Yachts Ltd</strong> — Engineering Department · AC Cooling Calculator v3.0 · ISO 7547
</footer>

<script>
// ═══════════════════════════════════════════════════════════════════
// ENHANCED AC COOLING CALCULATOR v3.0
// Features: Project Management, Humidity Calc, AHU Suggestions, PDF Export
// ═══════════════════════════════════════════════════════════════════

const TYPES={owners:{l:"Owner's Cabin",med:80,trop:250,ach:1.5},captains:{l:"Captain's Cabin",med:100,trop:270,ach:2.0},guest:{l:"Guest Stateroom",med:120,trop:290,ach:2.0},guest_l:{l:"Guest Stateroom (Lrg)",med:150,trop:310,ach:2.0},crew:{l:"Crew Cabin",med:120,trop:250,ach:2.5},crew_mess:{l:"Crew Mess",med:150,trop:290,ach:3.0},salon:{l:"Salon",med:150,trop:310,ach:2.0},wheelhouse:{l:"Wheelhouse",med:180,trop:330,ach:3.0},galley:{l:"Galley",med:220,trop:330,ach:8.0},laundry:{l:"Laundry",med:250,trop:350,ach:5.0},engine:{l:"Engine Room",med:300,trop:350,ach:0},technical:{l:"Technical",med:200,trop:310,ach:3.0},other:{l:"Other",med:130,trop:290,ach:2.0}};

const CLIMATE={med:{label:'Mediterranean',day:{dH:36.0,desc:'35→27°C'},sil:{dH:25.4,desc:'28→20°C'},red:{dH:8.0,desc:'Standby'},famu:{cabin_dH:23.0,central_dH:36.0},humidity:{day:{min:45,max:55},sil:{min:50,max:60},red:{min:55,max:70}}},trop:{label:'Tropical',day:{dH:66.3,desc:'40→27°C'},sil:{dH:44.7,desc:'35→24°C'},red:{dH:15.0,desc:'Standby'},famu:{cabin_dH:36.0,central_dH:66.3},humidity:{day:{min:40,max:50},sil:{min:45,max:55},red:{min:50,max:65}}}};

let SUPS={VECO:{n:'VECO',u:[{m:'MFC2',b:2000,w:7.5},{m:'MFC4',b:4000,w:9.3},{m:'MFC6',b:6000,w:10.3},{m:'MFC8',b:8000,w:12.3},{m:'MFC12',b:12000,w:13.8},{m:'MFC16',b:16000,w:16.3},{m:'EVA3',b:3000,w:6.0},{m:'EVA7',b:7000,w:7.6},{m:'EVA13',b:13000,w:8.7},{m:'EVA24',b:24000,w:18.0}]},DOMETIC:{n:'Dometic',u:[{m:'AU6DC',b:6000,w:10.9},{m:'AU9DC',b:9000,w:12.1},{m:'AU12DC',b:12000,w:15.1},{m:'AU18DC',b:18000,w:19.1},{m:'AU24DC',b:24000,w:20.9}]},WEBASTO:{n:'Webasto',u:[{m:'AH-CO05',b:4500,w:5.0},{m:'AH-CO06',b:6000,w:7.5},{m:'AH-CO09',b:9000,w:9.0},{m:'AH-CO12',b:12000,w:9.5},{m:'AH-CO16',b:16000,w:12.5},{m:'AH-CO24',b:24000,w:25.0},{m:'AH-CO30',b:30000,w:24.0}]},OTHER:{n:'Other',u:[{m:'Custom-3k',b:3000,w:0},{m:'Custom-6k',b:6000,w:0},{m:'Custom-12k',b:12000,w:0},{m:'Custom-24k',b:24000,w:0},{m:'Custom-36k',b:36000,w:0}]}};

const PRESETS={owners:{name:"Owner's Cabin",type:'owners',area:27,h:2.1,p:2,wc:true},captains:{name:"Captain's Cabin",type:'captains',area:9,h:2.1,p:1,wc:true},guest:{name:"Guest",type:'guest',area:12,h:2.1,p:2,wc:true},crew:{name:"Crew",type:'crew',area:7,h:2.1,p:2,wc:false},salon:{name:"Salon",type:'salon',area:35,h:2.2,p:0,wc:false},galley:{name:"Galley",type:'galley',area:15,h:2.1,p:1,wc:false}};

const S={climate:'med',famu:false,sup:'VECO',cabins:[],nid:1,project:{yacht:'',proj:'',by:'Mikael Strengell',date:new Date().toISOString().split('T')[0],rev:'',client:'',class:'Lloyd\'s Register (LRS)'}};

function init(){renderProjectFields();renderSupplierButtons();renderMainContent();loadSuppliersFromStorage();document.getElementById('f-date').valueAsDate=new Date();}

function renderProjectFields(){const html=`<div class="field"><label>Yacht Name</label><input type="text" id="f-yacht" placeholder="e.g. B107C ZETEO" oninput="S.project.yacht=this.value"></div><div class="field"><label>Project No.</label><input type="text" id="f-proj" placeholder="e.g. B107C-AC-001" oninput="S.project.proj=this.value"></div><div class="field"><label>Calculated By</label><input type="text" id="f-by" value="Mikael Strengell" oninput="S.project.by=this.value"></div><div class="field"><label>Date</label><input type="date" id="f-date" oninput="S.project.date=this.value"></div><div class="field"><label>Revision</label><input type="text" id="f-rev" placeholder="Rev. A" oninput="S.project.rev=this.value"></div><div class="field"><label>Client / Owner</label><input type="text" id="f-client" placeholder="Owner" oninput="S.project.client=this.value"></div><div class="field"><label>Class Society</label><select id="f-class" onchange="S.project.class=this.value"><option>Lloyd's Register (LRS)</option><option>DNV</option><option>Bureau Veritas (BV)</option><option>MCA</option><option>RCD (EU)</option></select></div>`;document.getElementById('proj-grid').innerHTML=html;}

function toggleProj(){const p=document.getElementById('proj-panel');p.classList.toggle('open');document.getElementById('proj-chevron').textContent=p.classList.contains('open')?'▴':'▾';}

function saveProject(){if(!S.project.yacht){alert('Enter yacht name');return;}const pid=Date.now().toString();const proj={id:pid,...S.project,cabins:S.cabins,sup:S.sup,climate:S.climate,famu:S.famu,cop:document.getElementById('cop').value};let projects=JSON.parse(localStorage.getItem('ac_projects')||'[]');projects.push(proj);localStorage.setItem('ac_projects',JSON.stringify(projects));alert(`Project "${S.project.yacht}" saved!`);}

function openProjectModal(){const projects=JSON.parse(localStorage.getItem('ac_projects')||'[]');let html='';if(projects.length===0)html='<p style="color:var(--g500)">No saved projects</p>';else html=projects.map((p,i)=>`<div style="padding:12px;background:var(--g100);border-radius:var(--r2);cursor:pointer" onclick="loadProject(${i})"><strong>${p.yacht}</strong><br><span style="font-size:11px;color:var(--g500)">${p.proj} · ${p.date}</span></div>`).join('');document.getElementById('projects-list').innerHTML=html;document.getElementById('proj-overlay').classList.add('show');document.getElementById('proj-modal').classList.add('show');}

function closeProjectModal(){document.getElementById('proj-overlay').classList.remove('show');document.getElementById('proj-modal').classList.remove('show');}

function loadProject(i){const projects=JSON.parse(localStorage.getItem('ac_projects')||'[]');const p=projects[i];S.project={yacht:p.yacht,proj:p.proj,by:p.by,date:p.date,rev:p.rev,client:p.client,class:p.class};S.cabins=p.cabins;S.sup=p.sup;S.climate=p.climate;S.famu=p.famu;document.getElementById('cop').value=p.cop;closeProjectModal();renderProjectFields();renderMainContent();recalc();alert('Project loaded!');}

function newProject(){S.project={yacht:'',proj:'',by:'Mikael Strengell',date:new Date().toISOString().split('T')[0],rev:'',client:'',class:'Lloyd\'s Register (LRS)'};S.cabins=[];S.nid=1;S.climate='med';S.famu=false;S.sup='VECO';document.getElementById('cop').value='3.0';renderProjectFields();renderMainContent();}

function calcHumidity(){const dH_d=S.famu?CLIMATE[S.climate].famu.cabin_dH:CLIMATE[S.climate].day.dH;const rh_day=CLIMATE[S.climate].humidity.day;const rh_sil=CLIMATE[S.climate].humidity.sil;const rh_red=CLIMATE[S.climate].humidity.red;return{day:{rh_min:rh_day.min,rh_max:rh_day.max,dH:dH_d},sil:{rh_min:rh_sil.min,rh_max:rh_sil.max},red:{rh_min:rh_red.min,rh_max:rh_red.max}};}

function calcCabin(c){const area=+c.area||0,h=+c.h||2.1,p=+c.p||0,ach=+c.ach||2,wc=!!c.wc;const t=TYPES[c.type]||TYPES.other;const cli=CLIMATE[S.climate];const wm2=S.climate==='med'?t.med:t.trop;const vol=area*h;const vACH=(vol*ach)/3.6;const vPer=p*7;const fv=Math.max(vACH,vPer,area>0?3:0);const wcExt=wc?Math.max(area*4.5,15):0;const dH_d=S.famu?cli.famu.cabin_dH:cli.day.dH;const vH_d=1.29*1.01*fv*dH_d;const base_d=wm2*area;const pers=p*150;const inst=10*area;const totW_d=base_d+vH_d+pers+inst;const totB_d=totW_d*3.41214;const base_s=wm2*area*0.55;const totW_s=base_s+vH_d*0.6+pers+inst;return{area,h,p,ach,wc,wm2,vol,fv,wcExt,base_d,vH_d,pers,inst,totW_d,totB_d,base_s,totW_s};}

function suggestAHUs(totalBTU){const units=[...SUPS[S.sup].u].sort((a,b)=>a.b-b.b);const suggestions=[];let remaining=totalBTU;while(remaining>0){const u=units.find(x=>x.b>=remaining*0.7);if(!u)break;suggestions.push(u);remaining-=u.b;}return suggestions.length>0?suggestions:[units.find(x=>x.b>=totalBTU)||units[units.length-1]];}

function renderMainContent(){const html=`<div class="card"><div class="card-hdr"><h2>Spaces &amp; Cabins</h2><div class="card-hdr-right"><span class="badge" id="cabin-badge">0</span><button class="btn btn-primary btn-sm no-print" onclick="addCabin()">+ Add</button></div></div><div class="tbl-wrap"><table><thead><tr><th>#</th><th>Name</th><th>Type</th><th>Area m²</th><th>H m</th><th>Persons</th><th>WC</th><th>ACH</th><th>Cooling</th><th>Status</th><th class="no-print"></th></tr></thead><tbody id="cabin-body"><tr id="empty-row"><td colspan="11"><div class="empty"><div class="icon">🚢</div><p>Click <strong>+ Add</strong> to begin</p></div></td></tr></tbody></table></div><div class="tbl-footer no-print"><span style="font-size:12px">Quick:</span><div id="quick-add-btns"></div></div></div><div class="card" id="results-card" style="display:none"><div class="card-hdr" style="background-color:var(--navy);color:white"><h2 style="color:white">Results Summary</h2><span class="badge badge-gold" id="res-badge">—</span></div><div class="kpi-row" id="kpi-row"></div><div class="section-sep">Equipment Selection</div><div class="tbl-wrap"><table class="result-table" id="equip-tbl"><thead><tr><th>#</th><th>Space</th><th>Type</th><th>Area</th><th>Cooling</th><th>Suggested AHUs</th><th>Total</th><th>Weight</th><th>Status</th></tr></thead><tbody id="equip-body"></tbody></table></div><div class="section-sep">Humidity Control (ISO 7547)</div><div id="humidity-section"></div><div class="section-sep">Energy Consumption</div><div class="energy-section"><div class="energy-total" id="energy-total">—</div><div class="energy-sub">Daily estimate · COP <span id="cop-display">3.0</span></div><div class="energy-bars" id="energy-bars"></div></div><div class="acc-hdr" onclick="toggleAcc(this)"><h3>Technical Details</h3><span class="chevron">▾</span></div><div class="acc-body"><div class="inner"><div class="tbl-wrap"><table class="result-table" id="tech-tbl"><thead><tr><th>#</th><th>Space</th><th>W/m²</th><th>Base W</th><th>Vent W</th><th>Persons W</th><th>Inst W</th><th>Total W</th></tr></thead><tbody id="tech-body"></tbody></table></div></div></div><div class="acc-hdr" onclick="toggleAcc(this)"><h3>Ventilation (ISO 7547)</h3><span class="chevron">▾</span></div><div class="acc-body"><div class="inner"><div class="tbl-wrap"><table class="result-table" id="vent-tbl"><thead><tr><th>#</th><th>Space</th><th>Vol</th><th>ACH</th><th>Flow</th><th>Min</th><th>Design</th><th>Compliance</th></tr></thead><tbody id="vent-body"></tbody></table></div></div></div><div class="acc-hdr" onclick="toggleAcc(this)"><h3>Design Conditions</h3><span class="chevron">▾</span></div><div class="acc-body"><div class="inner"><div class="tbl-wrap"><table class="result-table" id="cond-tbl"><thead><tr><th>Parameter</th><th>Value</th></tr></thead><tbody id="cond-body"></tbody></table></div></div></div></div>`;document.getElementById('main-content').innerHTML=html;renderQuickAddButtons();renderCabins();}

function renderQuickAddButtons(){const html=Object.entries(PRESETS).map(([k,v])=>`<button class="btn btn-sm" style="background:var(--g100)" data-preset="${k}" onclick="addPreset(this)">${v.name}</button>`).join('');document.getElementById('quick-add-btns').innerHTML=html;}

function addPreset(btn){const key=btn.getAttribute('data-preset');addCabin(JSON.parse(JSON.stringify(PRESETS[key])));}

function renderCabins(){if(S.cabins.length===0)return;const tbody=document.getElementById('cabin-body');const er=document.getElementById('empty-row');if(er)er.remove();S.cabins.forEach((c,i)=>{const cr=calcCabin(c);const tr=document.createElement('tr');tr.id='r'+c.id;tr.innerHTML=`<td style="color:var(--g500);font-weight:600">${i+1}</td><td><input class="ti ti-name" type="text" value="${c.name||''}" oninput="upd(${c.id},'name',this.value)"></td><td><select class="ti ti-type" onchange="updType(${c.id},this.value)">${Object.entries(TYPES).map(([k,v])=>`<option value="${k}"${c.type===k?'selected':''}>${v.l}</option>`).join('')}</select></td><td><input class="ti ti-num" type="number" value="${c.area||''}" oninput="upd(${c.id},'area',+this.value)"></td><td><input class="ti ti-num" type="number" value="${c.h||2.1}" oninput="upd(${c.id},'h',+this.value)"></td><td><input class="ti ti-num" type="number" value="${c.p||0}" oninput="upd(${c.id},'p',+this.value)"></td><td class="tc"><input type="checkbox" ${c.wc?'checked':''} onchange="upd(${c.id},'wc',this.checked)"></td><td><input class="ti ti-num" type="number" value="${c.ach||2}" oninput="upd(${c.id},'ach',+this.value)"></td><td style="font-weight:600;white-space:nowrap">${f1(cr.totW_d/1000)} kW</td><td><span class="pill p-ok">✓</span></td><td class="no-print"><button class="icon-btn" onclick="removeRow(${c.id})">✕</button></td>`;document.getElementById('cabin-body').appendChild(tr);});document.getElementById('cabin-badge').textContent=S.cabins.length+' space'+(S.cabins.length!==1?'s':'');}

function recalc(){if(!S.cabins.length){document.getElementById('results-card').style.display='none';return;}const rows=S.cabins.map((c,i)=>{const cr=calcCabin(c);const suggested=suggestAHUs(cr.totB_d);const totBTU=suggested.reduce((s,u)=>s+u.b,0);const totKg=suggested.reduce((s,u)=>s+u.w,0);return{c,cr,suggested,totBTU,totKg,idx:i};});const totW=rows.reduce((s,r)=>s+r.cr.totW_d,0);const totB=rows.reduce((s,r)=>s+r.cr.totB_d,0);const totInst=rows.reduce((s,r)=>s+r.totBTU,0);const totKg=rows.reduce((s,r)=>s+r.totKg,0);const cop=+document.getElementById('cop').value||3;const eKW=(totInst/3412)/cop;const totEd=eKW*12;const totEs=eKW*0.55*8;const totEr=eKW*0.05*4;const totEt=totEd+totEs+totEr;document.getElementById('results-card').style.display='block';renderKPIs(totW,totB,totInst,totKg,totEt,rows.length);renderEquip(rows,totB,totInst);renderHumidity(rows);renderEnergy(totEd,totEs,totEr,totEt);renderTech(rows,totW,totB);renderVent(rows);renderConditions();document.getElementById('res-badge').textContent=f0(totB)+' BTU';}

function renderKPIs(totW,totB,totInst,totKg,totEt,n){const cop=+document.getElementById('cop').value||3;const eKW=(totInst/3412)/cop;document.getElementById('kpi-row').innerHTML=`<div class="kpi"><div class="kpi-l">Cooling</div><div class="kpi-v">${f1(totW/1000)}</div><div class="kpi-u">kW</div></div><div class="kpi"><div class="kpi-l">BTU/h</div><div class="kpi-v">${f0(Math.round(totB/1000))}k</div><div class="kpi-u">needed</div></div><div class="kpi"><div class="kpi-l">Installed</div><div class="kpi-v">${f0(Math.round(totInst/1000))}k</div><div class="kpi-u">BTU/h</div></div><div class="kpi"><div class="kpi-l">Electrical</div><div class="kpi-v">${f1(eKW)}</div><div class="kpi-u">kW</div></div><div class="kpi"><div class="kpi-l">Weight</div><div class="kpi-v">${f1(totKg)}</div><div class="kpi-u">kg</div></div><div class="kpi"><div class="kpi-l">Daily Eng</div><div class="kpi-v">${f1(totEt)}</div><div class="kpi-u">kWh</div></div>`;}

function renderEquip(rows,totB,totInst){document.getElementById('equip-body').innerHTML=rows.map(({c,cr,suggested,totBTU},i)=>`<tr><td>${i+1}</td><td><strong>${c.name||(TYPES[c.type]?.l||c.type)}</strong></td><td>${TYPES[c.type]?.l||c.type}</td><td>${f1(cr.area)}</td><td>${f1(cr.totW_d/1000)} kW</td><td>${suggested.map(u=>u.m).join(' + ')}</td><td>${f0(totBTU)} BTU</td><td>${f1(suggested.reduce((s,u)=>s+u.w,0))} kg</td><td><span class="pill p-ok">✓</span></td></tr>`).join('');}

function renderHumidity(){const hum=calcHumidity();document.getElementById('humidity-section').innerHTML=`<div class="humidity-section"><div><strong>Relative Humidity Ranges (ISO 7547):</strong></div><div class="humidity-row"><div class="humidity-cell"><div class="humidity-label">Daytime</div><div class="humidity-val">${hum.day.rh_min}–${hum.day.rh_max}% RH</div><div class="humidity-unit">ΔH=${f1(hum.day.dH)} kJ/kg</div></div><div class="humidity-cell"><div class="humidity-label">Silent Mode</div><div class="humidity-val">${hum.sil.rh_min}–${hum.sil.rh_max}% RH</div><div class="humidity-unit">Reduced</div></div><div class="humidity-cell"><div class="humidity-label">Standby</div><div class="humidity-val">${hum.red.rh_min}–${hum.red.rh_max}% RH</div><div class="humidity-unit">Minimal</div></div></div></div>`;}

function renderEnergy(totEd,totEs,totEr,totEt){const maxBar=Math.max(totEd,1);document.getElementById('energy-total').textContent=f1(totEt)+' kWh / day';document.getElementById('cop-display').textContent=document.getElementById('cop').value||3;document.getElementById('energy-bars').innerHTML=`<div class="e-bar-row"><div class="e-bar-label">Daytime (12h)</div><div class="e-bar-track"><div class="e-bar-fill e-bar-day" style="width:100%" data-label="${f1(totEd)} kWh"></div></div><div class="e-bar-val">${f1(totEd)}</div></div><div class="e-bar-row"><div class="e-bar-label">Silent (8h)</div><div class="e-bar-track"><div class="e-bar-fill e-bar-sil" style="width:${Math.round(totEs/maxBar*100)}%" data-label="${f1(totEs)} kWh"></div></div><div class="e-bar-val">${f1(totEs)}</div></div><div class="e-bar-row"><div class="e-bar-label">Reduced (4h)</div><div class="e-bar-track"><div class="e-bar-fill e-bar-red" style="width:${Math.round(totEr/maxBar*100)}%" data-label="${f1(totEr)} kWh"></div></div><div class="e-bar-val">${f1(totEr)}</div></div><div class="e-bar-row" style="margin-top:8px;border-top:1px solid var(--g200);padding-top:8px"><div class="e-bar-label" style="font-weight:700">Daily Total</div><div></div><div class="e-bar-val" style="font-weight:700;color:var(--navy)">${f1(totEt)} kWh</div></div>`;}

function renderTech(rows){document.getElementById('tech-body').innerHTML=rows.map(({c,cr},i)=>`<tr><td>${i+1}</td><td>${c.name||(TYPES[c.type]?.l||'Space')}</td><td>${cr.wm2}</td><td>${f0(cr.base_d)}</td><td>${f0(cr.vH_d)}</td><td>${f0(cr.pers)}</td><td>${f0(cr.inst)}</td><td>${f0(cr.totW_d)}</td></tr>`).join('');}

function renderVent(rows){document.getElementById('vent-body').innerHTML=rows.map(({c,cr},i)=>{const classMin=Math.max(cr.p*7,cr.vol*0.5/3.6);const ok=cr.fv>=classMin;return`<tr><td>${i+1}</td><td>${c.name||(TYPES[c.type]?.l||'Space')}</td><td>${f1(cr.vol)}</td><td>${c.ach||2}</td><td>${f1(cr.fv)}</td><td>${f1(classMin)}</td><td>${f1(cr.fv)}</td><td>${ok?'<span class="pill p-ok">✓</span>':'<span class="pill p-err">✗</span>'}</td></tr>`;}).join('');}

function renderConditions(){const cli=CLIMATE[S.climate];document.getElementById('cond-body').innerHTML=`<tr><td>Climate</td><td>${cli.label}</td></tr><tr><td>Day ΔH</td><td>${cli.day.dH} kJ/kg</td></tr><tr><td>Silent ΔH</td><td>${cli.sil.dH} kJ/kg</td></tr><tr><td>Standard</td><td>ISO 7547</td></tr>`;}

function toggleAcc(el){el.classList.toggle('open');el.nextElementSibling?.classList.toggle('open');}

function addCabin(data){const id=S.nid++;const c=data?{...data,id}:{id,name:'',type:'guest',area:'',h:2.1,p:2,wc:true,ach:2.0};S.cabins.push(c);renderCabins();recalc();}

function removeRow(id){S.cabins=S.cabins.filter(c=>c.id!==id);document.getElementById('r'+id)?.remove();recalc();}

function upd(id,field,val){const c=S.cabins.find(c=>c.id===id);if(c){c[field]=val;recalc();}}

function updType(id,type){const c=S.cabins.find(c=>c.id===id);if(!c)return;c.type=type;recalc();}

function setClimate(clim){S.climate=clim;document.getElementById('btn-med').classList[clim==='med'?'add':'remove']('on');document.getElementById('btn-trop').classList[clim==='trop'?'add':'remove']('on');recalc();}

function setFAMU(val){S.famu=val;document.getElementById('btn-famu-n').classList[!val?'add':'remove']('on');document.getElementById('btn-famu-y').classList[val?'add':'remove']('on');recalc();}

function setSup(sup){S.sup=sup;renderSupplierButtons();recalc();}

function renderSupplierButtons(){document.getElementById('sup-pick').innerHTML=Object.keys(SUPS).map(k=>`<button class="sup-btn${S.sup===k?' on':''}" onclick="setSup('${k}')">${SUPS[k].n}</button>`).join('')+'<button class="btn btn-link btn-xs" onclick="openSupplierModal()" style="margin-left:4px">⚙</button>';}

function openSupplierModal(){renderSupplierEditor();document.getElementById('overlay').classList.add('show');document.getElementById('sup-modal').classList.add('show');}

function closeSupplierModal(){document.getElementById('overlay').classList.remove('show');document.getElementById('sup-modal').classList.remove('show');}

function renderSupplierEditor(){const units=SUPS[S.sup].u;document.getElementById('modal-sup-name').textContent=SUPS[S.sup].n;document.getElementById('sup-edit-body').innerHTML=units.map((u,i)=>`<tr><td><input type="text" value="${u.m}" class="sup-inp" onchange="SUPS['${S.sup}'].u[${i}].m=this.value"></td><td><input type="number" value="${u.b}" class="sup-inp" onchange="SUPS['${S.sup}'].u[${i}].b=+this.value"></td><td><input type="number" value="${u.w}" class="sup-inp" onchange="SUPS['${S.sup}'].u[${i}].w=+this.value"></td><td class="no-print"><button class="icon-btn" onclick="SUPS['${S.sup}'].u.splice(${i},1);renderSupplierEditor()">✕</button></td></tr>`).join('');}

function addSupplierUnit(){const m=document.getElementById('new-model').value;const b=+document.getElementById('new-btu').value;const w=+document.getElementById('new-kg').value;if(!m||!b){alert('Fill all fields');return;}SUPS[S.sup].u.push({m,b,w});SUPS[S.sup].u.sort((a,b)=>a.b-b.b);document.getElementById('new-model').value='';document.getElementById('new-btu').value='';document.getElementById('new-kg').value='';renderSupplierEditor();saveSuppliersToStorage();recalc();}

function importSupplierData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=evt=>{try{let data;if(file.name.endsWith('.json')){data=JSON.parse(evt.target.result);}else{data=parseCSV(evt.target.result);}if(Array.isArray(data)){SUPS[S.sup].u=data.map(row=>({m:row.model||row.name||'',b:+row.btu||+row.capacity||0,w:+row.weight||0}));SUPS[S.sup].u.sort((a,b)=>a.b-b.b);renderSupplierEditor();saveSuppliersToStorage();recalc();alert('Supplier data imported!');}}catch(err){alert('Error: '+err.message);}};reader.readAsText(file);}

function parseCSV(text){const lines=text.trim().split('\n');const headers=lines[0].toLowerCase().split(',').map(h=>h.trim());return lines.slice(1).map(line=>{const values=line.split(',').map(v=>v.trim());const obj={};headers.forEach((h,i)=>obj[h]=values[i]);return obj;});}

function saveSuppliersToStorage(){localStorage.setItem('ac_suppliers',JSON.stringify(SUPS));}

function loadSuppliersFromStorage(){const stored=localStorage.getItem('ac_suppliers');if(stored){try{SUPS=JSON.parse(stored);}catch(e){}}}

function exportExcel(){const ws=XLSX.utils.table_to_sheet(document.getElementById('equip-tbl'));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Results');XLSX.writeFile(wb,`${S.project.yacht||'AC_Calc'}_${new Date().toISOString().split('T')[0]}.xlsx`);}

function exportProfessionalPDF(){const element=document.getElementById('results-card');const opt={margin:10,filename:`${S.project.yacht||'AC_Calc'}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{orientation:'landscape',unit:'mm',format:'a4'}};html2pdf().set(opt).from(element).save();}

function f0(n){return Math.round(n).toLocaleString();}
function f1(n){return(Math.round(n*10)/10).toLocaleString();}

window.addEventListener('DOMContentLoaded',init);
</script>
